<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NASA UNIVERSE AI — Centro de Controle</title>
<meta name="description" content="Painel de exploração espacial em tempo real: APOD, Marte, ISS, asteroides, lançamentos e clima espacial via api.nasa.gov.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23050810'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23ff7a3d'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%2335e0c4' stroke-width='1.5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* =====================================================================
   NASA UNIVERSE AI — CSS
   Paleta "sala de controle": vácuo quase-preto + âmbar de sinal (flare)
   + ciano de telemetria. Tipografia geométrica para headers, mono para dados.
   ===================================================================== */
:root{
  --bg-0:#050810; --bg-1:#0b111b; --bg-2:#121b28; --bg-3:#1a2636;
  --line:#243247; --line-soft:#18212f;
  --text-0:#eef3f8; --text-1:#8fa0b5; --text-2:#57667a;
  --flare:#ff7a3d; --flare-bg:rgba(255,122,61,.13); --flare-dim:#a0512b;
  --telem:#35e0c4; --telem-bg:rgba(53,224,196,.13);
  --danger:#ff4d5e; --danger-bg:rgba(255,77,94,.13);
  --warn:#ffcc4d; --warn-bg:rgba(255,204,77,.13);
  --safe:#4ade80; --safe-bg:rgba(74,222,128,.13);
  --grad-flare:linear-gradient(135deg,#ffab6b 0%,#ff7a3d 55%,#c9531d 100%);
  --grad-telem:linear-gradient(135deg,#7cf3e0 0%,#35e0c4 60%,#199c85 100%);
  --font-display:"Space Grotesk",sans-serif;
  --font-body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px;
  --radius-sm:3px; --radius-md:6px; --radius-lg:10px;
  --maxw:1320px; --header-h:60px; --ticker-h:34px;
  --shadow-md:0 6px 22px rgba(0,0,0,.5); --shadow-lg:0 20px 54px rgba(0,0,0,.6);
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
html,body{max-width:100%;overflow-x:hidden}
body{
  background:var(--bg-0); color:var(--text-0); font-family:var(--font-body);
  font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100vh;
}
body.modal-open{overflow:hidden;position:fixed;inset:0;width:100%}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:inherit;background:none;border:none}
ul{list-style:none}
::selection{background:var(--flare);color:#1a0d05}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg-0)}
::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:8px}
:focus-visible{outline:2px solid var(--flare);outline-offset:2px}
.mono{font-family:var(--font-mono)}
.hidden{display:none !important}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

#starfield{position:fixed;inset:0;z-index:-1;background:var(--bg-0)}
#starfield canvas{width:100%;height:100%;display:block}

.app-shell{min-height:100vh;display:flex;flex-direction:column;max-width:100%;overflow-x:hidden;position:relative}
.container{max-width:var(--maxw);margin:0 auto;padding:0 var(--sp-5);width:100%;box-sizing:border-box}

.site-header{position:sticky;top:0;z-index:60;background:rgba(5,8,16,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.site-header .bar{height:var(--header-h);display:flex;align-items:center;gap:var(--sp-5)}
.brand{display:flex;align-items:center;gap:var(--sp-2);font-family:var(--font-display);font-weight:700;letter-spacing:.01em;font-size:1.1rem;white-space:nowrap}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--grad-flare);box-shadow:0 0 0 4px var(--flare-bg);animation:blink 2.4s infinite}
.brand em{font-style:normal;color:var(--flare)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
.hamburger-btn{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--text-0);flex:none}
.hamburger-btn .bars{position:relative;width:18px;height:13px}
.hamburger-btn .bars span{position:absolute;left:0;width:100%;height:2px;background:currentColor;border-radius:2px;transition:.22s var(--ease)}
.hamburger-btn .bars span:nth-child(1){top:0}
.hamburger-btn .bars span:nth-child(2){top:5.5px}
.hamburger-btn .bars span:nth-child(3){top:11px}
.hamburger-btn.open .bars span:nth-child(1){top:5.5px;transform:rotate(45deg)}
.hamburger-btn.open .bars span:nth-child(2){opacity:0}
.hamburger-btn.open .bars span:nth-child(3){top:5.5px;transform:rotate(-45deg)}
.main-nav{display:flex;align-items:center;gap:var(--sp-1);flex:1;overflow-x:auto;scrollbar-width:none}
.main-nav::-webkit-scrollbar{display:none}
.nav-link{padding:var(--sp-2) var(--sp-3);border-radius:var(--radius-sm);font-weight:600;color:var(--text-1);white-space:nowrap;
  transition:.15s var(--ease);text-transform:uppercase;letter-spacing:.05em;font-size:.7rem;font-family:var(--font-mono)}
.nav-link:hover{color:var(--text-0);background:var(--bg-2)}
.nav-link.active{color:#1a0d05;background:var(--flare)}
.nav-actions{display:flex;align-items:center;gap:var(--sp-2);margin-left:auto;flex-shrink:0}
.icon-btn{width:36px;height:36px;display:grid;place-items:center;border-radius:var(--radius-sm);color:var(--text-1);transition:.15s var(--ease);border:1px solid transparent}
.icon-btn:hover{background:var(--bg-2);color:var(--text-0)}
.icon-btn.is-active{color:var(--flare);border-color:var(--flare)}
.lang-switch{display:flex;align-items:center;gap:2px;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:2px}
.lang-btn{padding:5px 8px;font-size:.65rem;font-weight:700;font-family:var(--font-mono);border-radius:2px;color:var(--text-2);letter-spacing:.03em}
.lang-btn.active{background:var(--flare);color:#1a0d05}
.lang-btn:hover:not(.active){color:var(--text-0)}
@media (max-width:900px){
  .hamburger-btn{display:flex}
  .main-nav{position:fixed;top:var(--header-h);left:0;right:0;flex-direction:column;align-items:stretch;gap:0;
    background:var(--bg-1);border-bottom:1px solid var(--line);max-height:0;overflow:hidden;opacity:0;
    transition:max-height .25s var(--ease),opacity .2s var(--ease);z-index:59;box-shadow:var(--shadow-md);padding:0}
  .main-nav.open{max-height:82vh;opacity:1;overflow-y:auto}
  .nav-link{padding:14px var(--sp-5);font-size:.75rem;border-bottom:1px solid var(--line-soft);border-radius:0}
  .nav-link.active{background:var(--flare-bg);color:var(--flare)}
  .nav-actions{flex-direction:column;align-items:stretch;margin-left:0;padding:var(--sp-3) var(--sp-5) var(--sp-5);border-top:1px solid var(--line-soft);gap:var(--sp-3)}
  .nav-actions .icon-btn{width:100%;height:44px;justify-content:flex-start;padding:0 var(--sp-3);border-radius:var(--radius-sm);
    background:var(--bg-2);color:var(--text-0);display:flex;gap:var(--sp-3);font-weight:600;font-size:.85rem;border:1px solid var(--line)}
  .lang-switch{width:100%;justify-content:space-between}
  .lang-btn{flex:1;text-align:center;padding:10px}
}

.ticker{height:var(--ticker-h);background:var(--bg-1);border-bottom:1px solid var(--line);overflow:hidden;position:relative}
.ticker-track{display:flex;align-items:center;gap:var(--sp-6);height:100%;white-space:nowrap;animation:ticker-scroll 38s linear infinite}
.ticker:hover .ticker-track{animation-play-state:paused}
@keyframes ticker-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:.72rem;color:var(--text-1)}
.tick-item b{color:var(--telem);font-weight:600}
.tick-item .lbl{color:var(--text-2);text-transform:uppercase;letter-spacing:.05em}
.tick-sep{color:var(--line);margin:0 2px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:.75rem;
  letter-spacing:.03em;text-transform:uppercase;background:var(--bg-2);color:var(--text-0);border:1px solid var(--line);transition:.15s var(--ease);font-family:var(--font-mono)}
.btn:hover{border-color:var(--text-2)}
.btn-flare{background:var(--grad-flare);color:#1a0d05;border:none}
.btn-flare:hover{filter:brightness(1.08)}
.btn-ghost{background:none;border:1px solid var(--line)}
.btn-sm{padding:6px 11px;font-size:.68rem}
.btn:disabled{opacity:.4;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;background:var(--bg-3);color:var(--text-1);font-family:var(--font-mono)}
.chip.safe{background:var(--safe-bg);color:var(--safe)}
.chip.warn{background:var(--warn-bg);color:var(--warn)}
.chip.danger{background:var(--danger-bg);color:var(--danger)}
.chip.flare{background:var(--flare-bg);color:var(--flare)}
.chip .pulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.view{padding:var(--sp-6) 0 var(--sp-7);max-width:100%;overflow-x:hidden}
.view-head{display:flex;align-items:baseline;justify-content:space-between;gap:var(--sp-4);margin-bottom:var(--sp-5);flex-wrap:wrap}
.view-title{font-family:var(--font-display);font-size:2rem;font-weight:700;letter-spacing:-.01em}
.view-title em{font-style:normal;color:var(--flare)}
.view-sub{color:var(--text-2);font-size:.85rem;margin-top:2px;font-family:var(--font-mono)}
.section-title{font-family:var(--font-mono);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text-1);display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-3)}
.section-title::before{content:"//";color:var(--flare)}
.section{margin-bottom:var(--sp-7)}

.grid{display:grid;gap:var(--sp-3);max-width:100%}
.grid-3{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.grid-2{grid-template-columns:repeat(auto-fill,minmax(360px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
@media (max-width:480px){.grid-3,.grid-2,.grid-4{grid-template-columns:1fr}}

.empty-state{border:1px dashed var(--line);border-radius:var(--radius-lg);padding:var(--sp-6);text-align:center;color:var(--text-2);font-size:.85rem}
.empty-state b{display:block;color:var(--text-1);font-size:.95rem;margin-bottom:4px}
.skeleton{background:linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-md)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.panel{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:var(--sp-4);max-width:100%;box-sizing:border-box}
.panel:hover{border-color:#2c3c52}

.hero-apod{position:relative;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--line);margin-bottom:var(--sp-6);min-height:340px;
  background:var(--bg-1);display:flex;align-items:flex-end}
.hero-apod img,.hero-apod video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.72)}
.hero-apod::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(5,8,16,.94) 0%,rgba(5,8,16,.35) 55%,transparent 100%)}
.hero-body{position:relative;z-index:1;padding:var(--sp-6) var(--sp-5);width:100%}
.hero-eyebrow{font-family:var(--font-mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:var(--flare);margin-bottom:8px}
.hero-title{font-family:var(--font-display);font-size:1.7rem;font-weight:700;max-width:760px}
.hero-summary{color:var(--text-1);font-size:.86rem;max-width:680px;margin-top:10px;line-height:1.6}

.hero-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--sp-6)}
.hero-cell{background:var(--bg-1);padding:var(--sp-4) var(--sp-5);min-width:0}
.hero-cell .lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-2);font-weight:700;margin-bottom:6px;font-family:var(--font-mono)}
.hero-cell .val{font-family:var(--font-mono);font-size:1.45rem;font-weight:600}
.hero-cell .val.telem{color:var(--telem)}
.hero-cell .val.flare{color:var(--flare)}
.hero-cell .sub{font-size:.68rem;color:var(--text-2);margin-top:3px;font-family:var(--font-mono)}

.photo-card{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;
  transition:.18s var(--ease);position:relative}
.photo-card:hover{border-color:var(--flare);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.photo-card .thumb{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--bg-2)}
.photo-card .pc-body{padding:var(--sp-3)}
.photo-card .pc-title{font-weight:600;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.photo-card .pc-meta{font-size:.68rem;color:var(--text-2);margin-top:4px;font-family:var(--font-mono)}
.photo-card .fav-star{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(5,8,16,.6);
  backdrop-filter:blur(4px);display:grid;place-items:center;color:var(--text-1);transition:.15s}
.photo-card .fav-star.is-fav{color:var(--flare)}
.photo-card .fav-star:hover{color:var(--flare)}

.filter-row{display:flex;gap:var(--sp-2);flex-wrap:wrap;margin-bottom:var(--sp-5);align-items:flex-end}
.field{display:flex;flex-direction:column;gap:5px;min-width:0}
.field label{font-size:.64rem;text-transform:uppercase;color:var(--text-2);letter-spacing:.05em;font-weight:700;font-family:var(--font-mono)}
.select,.field input{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 12px;
  font-size:.78rem;color:var(--text-0);max-width:100%;min-width:140px}
.select:focus,.field input:focus{border-color:var(--flare)}

.table{width:100%;border-collapse:collapse;font-size:.8rem}
.table th{text-align:left;padding:8px 10px;font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-2);
  border-bottom:1px solid var(--line);font-family:var(--font-mono)}
.table td{padding:9px 10px;border-bottom:1px solid var(--line-soft)}
.table tr:hover td{background:var(--bg-2)}
.table .num{font-family:var(--font-mono);text-align:right}
.table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}

.modal-overlay{position:fixed;inset:0;background:rgba(3,5,10,.78);backdrop-filter:blur(4px);z-index:200;display:flex;
  align-items:flex-start;justify-content:center;padding:var(--sp-6) var(--sp-4);overflow-y:auto;opacity:0;pointer-events:none;
  transition:opacity .2s var(--ease)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);max-width:820px;width:100%;
  box-shadow:var(--shadow-lg);transform:translateY(12px);transition:transform .22s var(--ease);min-width:0;overflow:hidden;box-sizing:border-box}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-head{padding:var(--sp-5);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:var(--sp-3)}
.modal-head > div:first-child{min-width:0;overflow:hidden}
.modal-close{width:32px;height:32px;display:grid;place-items:center;border-radius:50%;color:var(--text-2);flex:none}
.modal-close:hover{background:var(--bg-2);color:var(--text-0)}
.modal-body{padding:var(--sp-5);min-width:0;max-width:100%;overflow-x:hidden;box-sizing:border-box}
.modal-img{width:100%;border-radius:var(--radius-md);margin-bottom:var(--sp-4);background:var(--bg-2)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:var(--sp-3);margin-top:var(--sp-4)}
.info-item{background:var(--bg-2);border-radius:var(--radius-md);padding:var(--sp-3);min-width:0}
.info-item .lbl{font-size:.6rem;text-transform:uppercase;color:var(--text-2);letter-spacing:.05em;margin-bottom:3px;font-family:var(--font-mono)}
.info-item .val{font-size:.84rem;font-weight:600;overflow-wrap:break-word;font-family:var(--font-mono)}

.risk-row{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);padding:var(--sp-3);
  background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-md);margin-bottom:8px;cursor:pointer}
.risk-row:hover{border-color:var(--flare)}
.risk-name{font-weight:700;font-size:.85rem}
.risk-meta{font-size:.7rem;color:var(--text-2);font-family:var(--font-mono);margin-top:2px}
.risk-dot{width:10px;height:10px;border-radius:50%;flex:none}
.risk-dot.safe{background:var(--safe);box-shadow:0 0 8px var(--safe)}
.risk-dot.warn{background:var(--warn);box-shadow:0 0 8px var(--warn)}
.risk-dot.danger{background:var(--danger);box-shadow:0 0 8px var(--danger)}

.chart-card{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:var(--sp-4);max-width:100%;box-sizing:border-box;min-width:0}
.chart-card canvas{width:100%;display:block;max-width:100%}
.legend{display:flex;gap:var(--sp-4);flex-wrap:wrap;margin-top:var(--sp-3);font-size:.7rem;color:var(--text-1);font-family:var(--font-mono)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block}

.iss-map{position:relative;width:100%;aspect-ratio:2/1;background:
  linear-gradient(var(--line-soft) 1px,transparent 1px) 0 0/100% 12.5%,
  linear-gradient(90deg,var(--line-soft) 1px,transparent 1px) 0 0/8.333% 100%,
  var(--bg-2);border:1px solid var(--line);border-radius:var(--radius-md);overflow:hidden}
.iss-map .equator{position:absolute;left:0;right:0;top:50%;height:1px;background:var(--flare-dim)}
.iss-map .meridian{position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--flare-dim)}
.iss-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--telem);box-shadow:0 0 0 6px var(--telem-bg),0 0 16px var(--telem);
  transform:translate(-50%,-50%);transition:left 1s linear,top 1s linear}
.iss-trail{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--telem);opacity:.4;transform:translate(-50%,-50%)}

.setup-card{max-width:540px;margin:var(--sp-7) auto;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:var(--sp-6)}
.setup-card h2{font-family:var(--font-display);font-size:1.4rem;margin-bottom:var(--sp-2)}
.setup-card p{color:var(--text-1);font-size:.85rem;margin-bottom:var(--sp-4);line-height:1.6}
.setup-card a{color:var(--flare);text-decoration:underline}

.toast-stack{position:fixed;bottom:var(--sp-5);right:var(--sp-5);z-index:300;display:flex;flex-direction:column;gap:var(--sp-2);max-width:320px}
.toast{background:var(--bg-1);border:1px solid var(--line);border-left:3px solid var(--flare);border-radius:var(--radius-md);
  padding:var(--sp-3) var(--sp-4);box-shadow:var(--shadow-md);font-size:.8rem;animation:toast-in .25s var(--ease)}
.toast.telem{border-left-color:var(--telem)}
.toast b{display:block;margin-bottom:2px;font-size:.78rem;font-family:var(--font-mono)}
@keyframes toast-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.site-footer{border-top:1px solid var(--line);padding:var(--sp-6) 0;margin-top:auto}
.site-footer .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--sp-3);
  font-size:.72rem;color:var(--text-2);font-family:var(--font-mono)}

.fade-in{animation:fadeIn .35s var(--ease) both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.reveal-stagger > *{animation:fadeIn .4s var(--ease) both}
.reveal-stagger > *:nth-child(1){animation-delay:.02s} .reveal-stagger > *:nth-child(2){animation-delay:.05s}
.reveal-stagger > *:nth-child(3){animation-delay:.08s} .reveal-stagger > *:nth-child(4){animation-delay:.11s}
.reveal-stagger > *:nth-child(5){animation-delay:.14s} .reveal-stagger > *:nth-child(6){animation-delay:.17s}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important}}

.launch-card{display:flex;gap:var(--sp-4);padding:var(--sp-4);background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);margin-bottom:12px;flex-wrap:wrap}
.launch-count{display:flex;gap:8px;margin-top:12px}
.launch-count .seg{background:var(--bg-2);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;min-width:52px}
.launch-count .seg b{display:block;font-family:var(--font-mono);font-size:1.15rem;color:var(--flare)}
.launch-count .seg span{font-size:.58rem;color:var(--text-2);text-transform:uppercase;font-family:var(--font-mono)}

.planet-swatch{width:16px;height:16px;border-radius:50%;flex:none;display:inline-block}

/* Novos estilos para os horários do lançamento */
.launch-times{margin: 8px 0; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-1); display: flex; flex-wrap: wrap; gap: 12px; background: var(--bg-2); border-radius: var(--radius-md); padding: 8px 12px;}
.launch-times span{display: inline-flex; align-items: center; gap: 4px;}
.launch-times .lt-lbl{color: var(--text-2); text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.03em;}
.launch-times .lt-val{font-weight: 700; color: var(--text-0);}

@media (max-width:720px){
  .container{padding:0 var(--sp-4)}
  .view-title{font-size:1.4rem}
  .hero-title{font-size:1.25rem}
  .modal-overlay{padding:0}
  .modal{max-width:100%;width:100%;border-radius:0;min-height:100dvh}
  .modal-body{padding:var(--sp-4)}
}

const Utils = (function(){
  function $(sel, ctx){ return (ctx||document).querySelector(sel); }
  function $all(sel, ctx){ return Array.from((ctx||document).querySelectorAll(sel)); }
  function el(tag, attrs, children){
    const node = document.createElement(tag);
    if(attrs) for(const k in attrs){
      if(k === "class") node.className = attrs[k];
      else if(k === "html") node.innerHTML = attrs[k];
      else if(k.startsWith("on") && typeof attrs[k] === "function") node.addEventListener(k.slice(2), attrs[k]);
      else node.setAttribute(k, attrs[k]);
    }
    (children||[]).forEach(c => { if(c!==null && c!==undefined) node.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
    return node;
  }
  function fmtDate(iso){
    const d = new Date(iso);
    const loc = I18N.lang()==="pt" ? "pt-BR" : (I18N.lang()==="es" ? "es-ES" : "en-US");
    return d.toLocaleDateString(loc,{day:"2-digit",month:"short",year:"numeric"});
  }
  function fmtISODate(d){ const dt = (d instanceof Date) ? d : new Date(d); return dt.toISOString().slice(0,10); }
  function daysAgo(n){ const d = new Date(); d.setUTCDate(d.getUTCDate()-n); return fmtISODate(d); }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function debounce(fn, ms){ let tm; return function(...a){ clearTimeout(tm); tm = setTimeout(()=>fn.apply(this,a), ms); }; }
  function numFmt(n, digits){
    if(n===null||n===undefined||isNaN(n)) return "—";
    const loc = I18N.lang()==="pt" ? "pt-BR" : (I18N.lang()==="es" ? "es-ES" : "en-US");
    return Number(n).toLocaleString(loc,{maximumFractionDigits:digits??1,minimumFractionDigits:0});
  }
  function pad2(n){ return String(n).padStart(2,"0"); }
  function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
  return { $, $all, el, fmtDate, fmtISODate, daysAgo, clamp, debounce, numFmt, pad2, sleep };
})();

const Store = (function(){
  const NS = "nasaai:";
  function get(key, fallback){ try{ const v = localStorage.getItem(NS+key); return v===null?fallback:JSON.parse(v); }catch(e){ return fallback; } }
  function set(key, val){ try{ localStorage.setItem(NS+key, JSON.stringify(val)); }catch(e){} }
  function cacheGet(key){ const e = get("cache:"+key, null); if(!e) return null; if(Date.now()>e.exp) return null; return e.data; }
  function cacheSet(key, data, ttlMs){ set("cache:"+key, { data, exp: Date.now()+ttlMs }); }
  return { get, set, cacheGet, cacheSet };
})();

const Api = (function(){
  const BASE = "https://api.nasa.gov";

  const LAUNCH_URL = "https://ll.thespacedevs.com/2.2.0/launch/upcoming/";

  function getKey(){ return Store.get("apiKey", null) || DEFAULT_KEY; }
  function setStatus(s){ const n = document.getElementById("apiStatusFoot"); if(n) n.textContent = "api: "+s; }

  function withKey(path, params){
    const usp = new URLSearchParams(params||{});
    usp.set("api_key", getKey());
    const sep = path.includes("?") ? "&" : "?";
    return BASE + path + sep + usp.toString();
  }

  async function rawFetch(url, retry){
    const res = await fetch(url);
    if(res.status === 503 && !retry){ await Utils.sleep(1200); return rawFetch(url, true); }
    if(res.status === 429){ setStatus("rate limited"); throw { code:"RATE_LIMIT", message:t("err.rateLimit") }; }
    if(res.status === 403){ setStatus("forbidden"); throw { code:"FORBIDDEN", message:t("err.forbidden") }; }
    if(!res.ok){ setStatus("offline"); throw { code:"HTTP_"+res.status, message:t("err.generic")+" (HTTP "+res.status+")." }; }
    setStatus("online");
    return res.json();
  }
  async function raw(url){
    setStatus("…");
    return rawFetch(url, false);
  }

  async function get(path, params, ttlMs){
    ttlMs = ttlMs==null ? 300000 : ttlMs;
    const cacheKey = path + "?" + new URLSearchParams(params||{}).toString();
    const cached = Store.cacheGet(cacheKey);
    if(cached) return cached;
    let data;
    try{ data = await raw(withKey(path, params)); }
    catch(err){ if(err && err.code) throw err; setStatus("offline"); throw { code:"NETWORK", message:t("err.network") }; }
    Store.cacheSet(cacheKey, data, ttlMs);
    return data;
  }

  async function issNow(){
    const cached = Store.cacheGet("iss:now");
    if(cached) return cached;
    setStatus("…");
    try{
      const res = await fetch(ISS_URL);
      if(!res.ok) throw { code:"HTTP_"+res.status, message:t("err.network") };
      const data = await res.json();
      setStatus("online");
      Store.cacheSet("iss:now", data, 4000);
      return data;
    }catch(err){ setStatus("offline"); throw { code:"NETWORK", message:t("err.network") }; }
  }

  async function marsImages(query, opts){
    opts = opts || {};
    const cacheKey = "images:"+query+":"+JSON.stringify(opts);
    const cached = Store.cacheGet(cacheKey);
    if(cached) return cached;
    const usp = new URLSearchParams({ q: query, media_type: "image" });
    if(opts.year_start) usp.set("year_start", opts.year_start);
    if(opts.year_end) usp.set("year_end", opts.year_end);
    if(opts.page_size) usp.set("page_size", opts.page_size);
    setStatus("…");
    try{
      const res = await fetch(IMAGES_BASE+"?"+usp.toString());
      if(!res.ok) throw { code:"HTTP_"+res.status, message:t("err.generic") };
      const data = await res.json();
      setStatus("online");
      const items = (data.collection && data.collection.items) || [];
      Store.cacheSet(cacheKey, items, 1800000);
      return items;
    }catch(err){ setStatus("offline"); throw (err&&err.code) ? err : { code:"NETWORK", message:t("err.network") }; }
  }

  async function launches(limit){
    const cacheKey = "launches:"+limit;
    const cached = Store.cacheGet(cacheKey);
    if(cached) return cached;
    setStatus("…");
    try{
      const res = await fetch(LAUNCH_URL+"?limit="+(limit||10)+"&mode=normal");
      if(!res.ok) throw { code:"HTTP_"+res.status, message:t("err.generic") };
      const data = await res.json();
      setStatus("online");
      const results = data.results || [];
      Store.cacheSet(cacheKey, results, 600000);
      return results;
    }catch(err){ setStatus("offline"); throw (err&&err.code) ? err : { code:"NETWORK", message:t("err.network") }; }
  }

  // NOVA FUNÇÃO PARA EPIC COM FALLBACK
  async function epic(){
    try {
      // Tenta o conjunto 'natural' primeiro
      return await get("/EPIC/api/natural", {}, 1800000);
    } catch (err) {
      console.warn("EPIC natural falhou, tentando enhanced...");
      // Se falhar, tenta o 'enhanced'
      return await get("/EPIC/api/enhanced", {}, 1800000);
    }
  }

  function epicImgUrl(item, type = 'natural'){
    // Tenta deduzir o tipo pela URL de origem, mas usa o parâmetro como fallback
    const d = new Date(item.date.replace(" ","T")+"Z");
    const y = d.getUTCFullYear(), m = Utils.pad2(d.getUTCMonth()+1), day = Utils.pad2(d.getUTCDate());
    return `https://epic.gsfc.nasa.gov/archive/${type}/${y}/${m}/${day}/png/${item.image}.png?api_key=${getKey()}`;
  }

  function invalidateAll(){
    Object.keys(localStorage).forEach(k => { if(k.startsWith("nasaai:cache:")) localStorage.removeItem(k); });
  }

  return {
    apod: (date) => get("/planetary/apod", date ? { date } : {}, 3600000),
    apodRandom: () => get("/planetary/apod", { count: 1 }, 0),
    neoFeed: (start, end) => get("/neo/rest/v1/feed", { start_date:start, end_date:end }, 600000),
    donkiFlares: (start, end) => get("/DONKI/FLR", { startDate:start, endDate:end }, 600000),
    epic, epicImgUrl,
    marsImages, launches, issNow, invalidateAll, getKey,
  };
})();

  function toggle(kind, item){
    const f = all(); if(!f[kind]) f[kind]=[];

/* =====================================================================
   7. ASTRO — cálculos locais (fase da Lua, tempo marciano)
   ===================================================================== */
const Astro = (function(){
  const SYNODIC = 29.53058867;
  const KNOWN_NEW_MOON = Date.UTC(2000,0,6,18,14,0);

  function moonPhase(date){
    date = date || new Date();
    const days = (date.getTime() - KNOWN_NEW_MOON) / 86400000;
    let phase = (days % SYNODIC) / SYNODIC;
    if(phase < 0) phase += 1;
    return phase;
  }
  const PHASE_KEYS = ["moon.new","moon.wax_cres","moon.first_q","moon.wax_gib","moon.full","moon.wan_gib","moon.last_q","moon.wan_cres"];
  const PHASE_LABELS = {
    pt: ["Lua Nova","Crescente","Quarto Crescente","Crescente Gibosa","Lua Cheia","Minguante Gibosa","Quarto Minguante","Minguante"],
    en: ["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"],
    es: ["Luna Nueva","Creciente","Cuarto Creciente","Gibosa Creciente","Luna Llena","Gibosa Menguante","Cuarto Menguante","Menguante"],
  };
  function moonPhaseLabel(phase){
    const p = phase*100;
    const labels = PHASE_LABELS[I18N.lang()] || PHASE_LABELS.pt;
    if(p<3||p>97) return labels[0];
    if(p<22) return labels[1];
    if(p<28) return labels[2];
    if(p<47) return labels[3];
    if(p<53) return labels[4];
    if(p<72) return labels[5];
    if(p<78) return labels[6];
    return labels[7];
  }
  function moonIllumination(phase){ return (1 - Math.cos(phase*2*Math.PI)) / 2; }

  function marsData(date){
    date = date || new Date();
    const JD_UTC = date.getTime()/86400000 + 2440587.5;
    const JD_TT = JD_UTC + 69.184/86400;
    const MSD = (JD_TT - 2405522.0028779) / 1.0274912517;
    const MTC = (MSD % 1) * 24;
    const CURIOSITY_LANDING_MSD = 49269.2288943;
    const PERSEVERANCE_LANDING_MSD = 52304.011;
    return {
      msd: MSD, mtc: MTC,
      curiositySol: Math.max(0, Math.floor(MSD - CURIOSITY_LANDING_MSD)),
      perseveranceSol: Math.max(0, Math.floor(MSD - PERSEVERANCE_LANDING_MSD)),
    };
  }
  function fmtMTC(mtc){
    const h = Math.floor(mtc), m = Math.floor((mtc-h)*60), s = Math.floor((((mtc-h)*60)-m)*60);
    return Utils.pad2(h)+":"+Utils.pad2(m)+":"+Utils.pad2(s);
  }
  return { moonPhase, moonPhaseLabel, moonIllumination, marsData, fmtMTC };
})();

/* =====================================================================
   8. IMPACT — física simplificada de impacto de asteroide
   Referência: Collins, Melosh & Marcus (2005), "Earth Impact Effects Program"
   (modelo educacional, não substitui simulações científicas completas)
   ===================================================================== */
const Impact = (function(){
  function calc(diameterM, velocityKms, densityKgm3, targetDensity){
    const radius = diameterM/2;
    const mass = densityKgm3 * (4/3) * Math.PI * Math.pow(radius,3);
    const velMs = velocityKms*1000;
    const energyJ = 0.5 * mass * velMs*velMs;
    const tntTons = energyJ / 4.184e9;
    const g = 9.81;
    const Lkm = diameterM/1000;
    const craterKm = 1.161 * Math.pow(densityKgm3/targetDensity, 1/3) * Math.pow(Lkm,0.78) * Math.pow(velocityKms,0.44) * Math.pow(g,-0.22);
    return { mass, energyJ, tntTons, craterKm: craterKm*1.25 };
  }
  return { calc };
})();

const Charts = (function(){
  function setupCanvas(canvas){
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const h = canvas.dataset.h ? Number(canvas.dataset.h) : 220;
    canvas.width = rect.width*ratio; canvas.height = h*ratio; canvas.style.height = h+"px";
    const ctx = canvas.getContext("2d"); ctx.scale(ratio,ratio);
    return { ctx, w: rect.width, h };
  }
  function colorVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
  function barChart(canvas, labels, values, opts){
    opts = opts||{};
    const { ctx, w, h } = setupCanvas(canvas);
    ctx.clearRect(0,0,w,h);
    const pad = { l:34, r:10, t:14, b:26 };
    const max = Math.max(1, ...values) * 1.15;
    const bw = (w-pad.l-pad.r)/Math.max(1,values.length);
    ctx.strokeStyle = colorVar("--line"); ctx.lineWidth = 1;
    for(let i=0;i<=4;i++){
      const y = pad.t + (h-pad.t-pad.b)*(i/4);
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke();
      ctx.fillStyle = colorVar("--text-2"); ctx.font = "10px monospace"; ctx.textAlign = "right";
      ctx.fillText(Math.round(max*(1-i/4)), pad.l-6, y+3);
    }
    values.forEach((v,i) => {
      const bh = (h-pad.t-pad.b)*(v/max);
      const x = pad.l + i*bw + bw*0.18;
      const y = h-pad.b-bh;
      const grad = ctx.createLinearGradient(0,y,0,h-pad.b);
      grad.addColorStop(0, opts.color || colorVar("--flare"));
      grad.addColorStop(1, colorVar("--bg-2"));
      ctx.fillStyle = grad; ctx.fillRect(x,y,bw*0.64,bh);
      ctx.fillStyle = colorVar("--text-1"); ctx.font = "10px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(labels[i], x+bw*0.32, h-8);
      ctx.fillStyle = colorVar("--text-0"); ctx.font = "700 10px monospace";
      ctx.fillText(String(v), x+bw*0.32, y-5);
    });
  }
  function donutChart(canvas, segments){
    const { ctx, w, h } = setupCanvas(canvas);
    ctx.clearRect(0,0,w,h);
    const cx=w/2, cy=h/2, r=Math.min(w,h)/2-10, rIn=r*0.62;
    const total = segments.reduce((s,x)=>s+x.value,0) || 1;
    let start = -Math.PI/2;
    segments.forEach(seg => {
      const angle = (seg.value/total)*Math.PI*2;
      ctx.beginPath(); ctx.arc(cx,cy,r,start,start+angle); ctx.arc(cx,cy,rIn,start+angle,start,true); ctx.closePath();
      ctx.fillStyle = seg.color; ctx.fill(); start += angle;
    });
    ctx.fillStyle = colorVar("--text-0"); ctx.font="700 16px monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(segments[0]?Math.round((segments[0].value/total)*100)+"%":"0%", cx, cy);
  }
  function groupedBarChart(canvas, labels, seriesA, seriesB){
    const { ctx, w, h } = setupCanvas(canvas);
    ctx.clearRect(0,0,w,h);
    const pad = { l:34, r:10, t:14, b:26 };
    const max = Math.max(1, ...seriesA.data, ...seriesB.data) * 1.15;
    const bw = (w-pad.l-pad.r)/labels.length;
    ctx.strokeStyle = colorVar("--line");
    for(let i=0;i<=4;i++){
      const y = pad.t + (h-pad.t-pad.b)*(i/4);
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(w-pad.r,y); ctx.stroke();
      ctx.fillStyle = colorVar("--text-2"); ctx.font="10px monospace"; ctx.textAlign="right";
      ctx.fillText(Math.round(max*(1-i/4)), pad.l-6, y+3);
    }
    labels.forEach((l,i) => {
      const gx = pad.l + i*bw;
      const subw = bw*0.36;
      [[seriesA.data[i], seriesA.color, 0.12], [seriesB.data[i], seriesB.color, 0.62]].forEach(([v,color,off]) => {
        const bh = (h-pad.t-pad.b)*(v/max);
        const x = gx + bw*off;
        const y = h - pad.b - bh;
        ctx.fillStyle = color;
        ctx.fillRect(x, y, subw, bh);
      });
      ctx.fillStyle = colorVar("--text-1"); ctx.font="10px sans-serif"; ctx.textAlign="center";
      ctx.fillText(l, gx+bw/2, h-8);
    });
  }
  return { barChart, donutChart, groupedBarChart };
})();

(function initStarfield(){
  const canvas = document.getElementById("starCanvas");
  const ctx = canvas.getContext("2d");
  let stars = [];
  function resize(){
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const count = Math.floor((canvas.width*canvas.height)/9000);
    stars = Array.from({length:count}, () => ({
      x: Math.random()*canvas.width, y: Math.random()*canvas.height,
      r: Math.random()*1.3+0.2, a: Math.random(), s: Math.random()*0.012+0.003,
    }));
  }
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(st => {
      st.a += st.s; const alpha = (Math.sin(st.a)+1)/2*0.8+0.15;
      ctx.beginPath(); ctx.fillStyle = "rgba(200,215,235,"+alpha.toFixed(3)+")";
      ctx.arc(st.x, st.y, st.r, 0, 7); ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  if(!window.matchMedia("(prefers-reduced-motion: reduce)").matches){
    window.addEventListener("resize", Utils.debounce(resize,200));
    resize(); tick();
  }
})();

   12. TELEMETRY TICKER
   ===================================================================== */
const Ticker = (function(){
  let items = { utc:"—", local:"—", moon:"—", issAlt:"—", issVel:"—", sol:"—", mtc:"—" };
  function render(){
    const track = document.getElementById("tickerTrack");
    if(!track) return;
    const list = [
      ["UTC", items.utc], [I18N.lang()==="pt"?"LOCAL":(I18N.lang()==="es"?"LOCAL":"LOCAL"), items.local],
      [t("home.moonPhase").toUpperCase(), items.moon],
      ["ISS ALT", items.issAlt], ["ISS VEL", items.issVel],
      [t("home.solCuriosity").toUpperCase(), items.sol], ["MTC", items.mtc],
    ];
    const buildOnce = () => list.map(([lbl,val]) => `<span class="tick-item"><span class="lbl">${lbl}</span><b>${val}</b></span><span class="tick-sep">◆</span>`).join("");
    track.innerHTML = buildOnce() + buildOnce();
  }
  function tickClock(){
    const now = new Date();
    items.utc = now.toUTCString().slice(17,25);
    items.local = now.toLocaleTimeString();
    const phase = Astro.moonPhase(now);
    items.moon = Astro.moonPhaseLabel(phase) + " · " + Math.round(Astro.moonIllumination(phase)*100)+"%";
    const mars = Astro.marsData(now);
    items.sol = String(mars.curiositySol);
    items.mtc = Astro.fmtMTC(mars.mtc);
    render();
  }
  async function tickISS(){
    try{
      const data = await Api.issNow();
      items.issAlt = Utils.numFmt(data.altitude,1)+" km";
      items.issVel = Utils.numFmt(data.velocity,0)+" km/h";
    }catch(e){ items.issAlt = "n/d"; items.issVel = "n/d"; }
    render();
  }
  function start(){
    tickClock(); tickISS();
    setInterval(tickClock, 1000);
    setInterval(tickISS, 15000);
  }
  return { start, render };
})();

   13. ROUTER
   ===================================================================== */
const Router = (function(){
  const routes = {};
  let currentPath = "/";
  function on(path, handler){ routes[path] = handler; }
  function current(){ return currentPath; }
  function resolve(){
    const hash = location.hash.replace(/^#/, "") || "/";
    const [pathPart] = hash.split("?");
    const segs = pathPart.split("/").filter(Boolean);
    currentPath = "/" + (segs[0]||"");
    Utils.$all(".nav-link").forEach(a => a.classList.toggle("active", a.dataset.route === "/"+(segs[0]||"")));
    const nav = document.getElementById("mainNav"); const hb = document.getElementById("hamburgerBtn");
    if(nav && nav.classList.contains("open")){ nav.classList.remove("open"); if(hb){ hb.classList.remove("open"); hb.setAttribute("aria-expanded","false"); } }
    if(segs.length===0) return routes["/"]();
    if(routes["/"+segs[0]]) return routes["/"+segs[0]](segs[1]);
    return routes["/"]();
  }
  function init(){ window.addEventListener("hashchange", resolve); resolve(); }
  return { on, init, resolve, current };
})();

  function launchCard(l){
    const card = Utils.el("div",{class:"launch-card fade-in"});
    const img = l.image ? Utils.el("img",{src:l.image,alt:l.name,style:"width:96px;height:96px;object-fit:cover;border-radius:8px;flex:none;background:var(--bg-2)"}) : null;

    const utcDate = new Date(l.net);
    // Calcula horário local baseado na longitude do pad (aproximado)
    let localTimeStr = "—";
    if (l.pad && l.pad.longitude) {
      const localOffsetHours = l.pad.longitude / 15;
      const localDate = new Date(utcDate.getTime() + localOffsetHours * 3600000);
      localTimeStr = localDate.toLocaleString(undefined, { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false });
    }

    // Horário de Brasília (GMT-3)
    const brtDate = new Date(utcDate.toLocaleString("en-US", {timeZone: "America/Sao_Paulo"}));
    const brtTimeStr = brtDate.toLocaleString(undefined, { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false });

    const timesHtml = Utils.el("div",{class:"launch-times"}, [
      Utils.el("span",{},[Utils.el("span",{class:"lt-lbl"},[t("launches.utcTime")+":"]), Utils.el("span",{class:"lt-val"},[utcDate.toISOString().replace('T',' ').slice(0,16)+" UTC"])]),
      Utils.el("span",{},[Utils.el("span",{class:"lt-lbl"},[t("launches.brtTime")+":"]), Utils.el("span",{class:"lt-val"},[brtTimeStr])]),
      localTimeStr !== "—" ? Utils.el("span",{},[Utils.el("span",{class:"lt-lbl"},[t("launches.localTime")+":"]), Utils.el("span",{class:"lt-val"},[localTimeStr])]) : null,
    ]);

    const info = Utils.el("div",{style:"flex:1;min-width:200px"},[
      Utils.el("div",{style:"font-weight:700;font-size:.95rem;margin-bottom:4px"},[l.name]),
      Utils.el("div",{class:"risk-meta"},[t("launches.agency")+": "+(l.launch_service_provider?l.launch_service_provider.name:"—")]),
      Utils.el("div",{class:"risk-meta"},[t("launches.rocket")+": "+(l.rocket&&l.rocket.configuration?l.rocket.configuration.name:"—")]),
      Utils.el("div",{class:"risk-meta"},[t("launches.pad")+": "+(l.pad?l.pad.name+" — "+(l.pad.location?l.pad.location.name:""):"—")]),
      Utils.el("div",{class:"risk-meta"},[t("launches.status")+": "+(l.status?l.status.name:"—")]),
      timesHtml,
    ]);

    const countdown = Utils.el("div",{class:"launch-count"});
    info.appendChild(countdown);
    function tick(){
      const diff = utcDate.getTime() - Date.now();
      countdown.innerHTML = "";
      if(diff<=0){ countdown.appendChild(Utils.el("span",{class:"chip flare"},["LANÇADO"])); return; }
      const dd=Math.floor(diff/86400000), hh=Math.floor(diff/3600000)%24, mm=Math.floor(diff/60000)%60, ss=Math.floor(diff/1000)%60;
      [[dd,t("launches.days")],[hh,t("launches.hours")],[mm,t("launches.min")],[ss,t("launches.sec")]].forEach(([v,lbl]) => {
        countdown.appendChild(Utils.el("div",{class:"seg"},[Utils.el("b",{},[String(v).padStart(2,"0")]), Utils.el("span",{},[lbl])]));
      });
    }
    tick();
    const timer = setInterval(() => { if(Router.current()!=="/lancamentos"){ clearInterval(timer); return; } tick(); }, 1000);
    launchTimers.push(timer);
    if(img) card.appendChild(img);
    card.appendChild(info);
    return card;
  }

      tableHost.appendChild(table);
    }
    selA.onchange = paint; selB.onchange = paint;
    paint();
  }

  /* ---------- FAVORITOS ---------- */
  function renderFavorites(){
    main().innerHTML = "";
    main().appendChild(Utils.el("div",{class:"view-head"},[
      Utils.el("div",{},[Utils.el("h1",{class:"view-title"},[t("favorites.title")]), Utils.el("p",{class:"view-sub"},[t("favorites.subtitle")])]),
    ]));
    const f = Favorites.all();

    const apodSec = section(t("favorites.apodSection")+" ("+f.apod.length+")");
    apodSec.body.className = "grid grid-3";
    if(!f.apod.length) apodSec.body.appendChild(Utils.el("div",{class:"empty-state"},[t("favorites.emptyApod")]));
    f.apod.forEach(item => {
      const card = Utils.el("div",{class:"photo-card"},[
        Utils.el("img",{class:"thumb",src:item.url,alt:item.title,loading:"lazy"}),
        Utils.el("div",{class:"pc-body"},[Utils.el("div",{class:"pc-title"},[item.title]), Utils.el("div",{class:"pc-meta"},[item.date])]),
      ]);
      const rm = Utils.el("button",{class:"fav-star is-fav"},["★"]);
      rm.onclick = (e) => { e.stopPropagation(); Favorites.remove("apod", item.id); renderFavorites(); };
      card.appendChild(rm);
      apodSec.body.appendChild(card);
    });

    const marsSec = section(t("favorites.marsSection")+" ("+f.mars.length+")");
    marsSec.body.className = "grid grid-3";
    if(!f.mars.length) marsSec.body.appendChild(Utils.el("div",{class:"empty-state"},[t("favorites.emptyMars")]));
    f.mars.forEach(item => {
      const card = Utils.el("div",{class:"photo-card"},[
        Utils.el("img",{class:"thumb",src:item.img_src,alt:item.title,loading:"lazy"}),
        Utils.el("div",{class:"pc-body"},[Utils.el("div",{class:"pc-title"},[item.title]), Utils.el("div",{class:"pc-meta"},[(item.date||"").slice(0,10)])]),
      ]);
      const rm = Utils.el("button",{class:"fav-star is-fav"},["★"]);
      rm.onclick = (e) => { e.stopPropagation(); Favorites.remove("mars", item.id); renderFavorites(); };
      card.appendChild(rm);
      marsSec.body.appendChild(card);
    });

    const neoSec = section(t("favorites.asteroidsSection")+" ("+f.asteroids.length+")");
    if(!f.asteroids.length) neoSec.body.appendChild(Utils.el("div",{class:"empty-state"},[t("favorites.emptyAsteroids")]));
    f.asteroids.forEach(item => {
      const row = Utils.el("div",{class:"risk-row"},[
        Utils.el("div",{},[Utils.el("div",{class:"risk-name"},[item.name]), Utils.el("div",{class:"risk-meta"},[item.date])]),
        (()=>{ const rm = Utils.el("button",{class:"btn btn-sm"},[t("favorites.remove")]); rm.onclick=()=>{ Favorites.remove("asteroids", item.id); renderFavorites(); }; return rm; })(),
      ]);
      neoSec.body.appendChild(row);
    });
    neoSec.body.className = "";

    main().append(apodSec.wrap, marsSec.wrap, neoSec.wrap);
  }

  return {
    renderHome, renderApod, renderMars, renderIss, renderAsteroids, renderEarth, renderSpaceWeather,
    renderLaunches, renderPlanets, renderFavorites,
  };
})();

/* =====================================================================
   15. APP BOOTSTRAP
   ===================================================================== */
function openSettings(){
  document.getElementById("apiKeyInput").value = "";
  document.getElementById("settingsModal").classList.add("open");
  document.body.classList.add("modal-open");
  I18N.applyStatic();
}
function closeSettings(){ document.getElementById("settingsModal").classList.remove("open"); syncModalOpenClass(); }
function closeDetailModal(){ document.getElementById("detailModal").classList.remove("open"); syncModalOpenClass(); }
function syncModalOpenClass(){
  const anyOpen = document.getElementById("detailModal").classList.contains("open") || document.getElementById("settingsModal").classList.contains("open");
  document.body.classList.toggle("modal-open", anyOpen);
}
function toggleMobileNav(force){
  const nav = document.getElementById("mainNav"); const hb = document.getElementById("hamburgerBtn");
  const open = force !== undefined ? force : !nav.classList.contains("open");
  nav.classList.toggle("open", open); hb.classList.toggle("open", open); hb.setAttribute("aria-expanded", open?"true":"false");
}

function initApp(){
  I18N.applyStatic();

  Router.on("/", Views.renderHome);
  Router.on("/apod", Views.renderApod);
  Router.on("/marte", Views.renderMars);
  Router.on("/iss", Views.renderIss);
  Router.on("/asteroides", Views.renderAsteroids);
  Router.on("/terra", Views.renderEarth);
  Router.on("/clima", Views.renderSpaceWeather);
  Router.on("/lancamentos", Views.renderLaunches);
  Router.on("/planetas", Views.renderPlanets);
  Router.on("/favoritos", Views.renderFavorites);
  Router.init();

  document.getElementById("hamburgerBtn").onclick = (e) => { e.stopPropagation(); toggleMobileNav(); };
  document.getElementById("mainNav").addEventListener("click", (e) => { if(e.target.closest(".nav-link")) toggleMobileNav(false); });
  document.addEventListener("click", (e) => {
    const nav = document.getElementById("mainNav");
    if(!nav.classList.contains("open")) return;
    if(e.target.closest("#mainNav") || e.target.closest("#hamburgerBtn")) return;
    toggleMobileNav(false);
  });
  window.addEventListener("resize", Utils.debounce(() => { if(window.innerWidth>900) toggleMobileNav(false); }, 150));

  document.getElementById("langSwitch").addEventListener("click",(e)=>{
    const btn = e.target.closest(".lang-btn");
    if(!btn) return;
    I18N.setLang(btn.dataset.lang);
    Ticker.render();
    Router.resolve();
  });

  document.getElementById("refreshBtn").onclick = () => { Api.invalidateAll(); Router.resolve(); Toast.show(t("toast.updated"), t("toast.updatedMsg"), {telem:true}); };
  document.getElementById("settingsBtn").onclick = openSettings;
  document.getElementById("settingsCloseBtn").onclick = closeSettings;
  document.getElementById("settingsModal").addEventListener("click",(e)=>{ if(e.target.id==="settingsModal") closeSettings(); });
  document.getElementById("modalCloseBtn").onclick = closeDetailModal;
  document.getElementById("detailModal").addEventListener("click",(e)=>{ if(e.target.id==="detailModal") closeDetailModal(); });
  document.addEventListener("keydown",(e)=>{ if(e.key==="Escape"){ closeSettings(); closeDetailModal(); toggleMobileNav(false); } });

  document.getElementById("saveSettingsBtn").onclick = () => {
    const keyInput = document.getElementById("apiKeyInput").value.trim();
    if(keyInput) Store.set("apiKey", keyInput);
    Api.invalidateAll();
    closeSettings();
    Toast.show(t("toast.configured"), t("settings.saved"), {telem:true});
    Router.resolve();
  };

  Ticker.start();
}

document.addEventListener("DOMContentLoaded", initApp);

})();
</script>
