
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NASA UNIVERSE AI — Centro de Controle</title>
<meta name="description" content="Painel de exploração espacial em tempo real: APOD, Marte, ISS, asteroides, Lua, CME, tempestades geomagnéticas e muito mais via api.nasa.gov.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23050810'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23ff7a3d'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%2335e0c4' stroke-width='1.5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#050810;--bg-1:#0b111b;--bg-2:#121b28;--bg-3:#1a2636;
  --line:#243247;--line-soft:#18212f;
  --text-0:#eef3f8;--text-1:#8fa0b5;--text-2:#57667a;
  --flare:#ff7a3d;--flare-bg:rgba(255,122,61,.13);--flare-dim:#a0512b;
  --telem:#35e0c4;--telem-bg:rgba(53,224,196,.13);
  --danger:#ff4d5e;--danger-bg:rgba(255,77,94,.13);
  --warn:#ffcc4d;--warn-bg:rgba(255,204,77,.13);
  --safe:#4ade80;--safe-bg:rgba(74,222,128,.13);
  --moon:#c8d8f0;--moon-bg:rgba(200,216,240,.1);
  --cme:#b57fff;--cme-bg:rgba(181,127,255,.13);
  --grad-flare:linear-gradient(135deg,#ffab6b 0%,#ff7a3d 55%,#c9531d 100%);
  --grad-telem:linear-gradient(135deg,#7cf3e0 0%,#35e0c4 60%,#199c85 100%);
  --font-display:"Space Grotesk",sans-serif;
  --font-body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;--sp-7:48px;
  --radius-sm:3px;--radius-md:6px;--radius-lg:10px;
  --maxw:1320px;--header-h:60px;--ticker-h:34px;
  --shadow-md:0 6px 22px rgba(0,0,0,.5);--shadow-lg:0 20px 54px rgba(0,0,0,.6);
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
html,body{max-width:100%;overflow-x:hidden}
body{background:var(--bg-0);color:var(--text-0);font-family:var(--font-body);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
body.modal-open{overflow:hidden;position:fixed;inset:0;width:100%}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:inherit;background:none;border:none}
ul{list-style:none}
::selection{background:var(--flare);color:#1a0d05}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg-0)}
::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:8px}
:focus-visible{outline:2px solid var(--flare);outline-offset:2px}
.mono{font-family:var(--font-mono)}
.hidden{display:none !important}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
#starfield{position:fixed;inset:0;z-index:-1;background:var(--bg-0)}
#starfield canvas{width:100%;height:100%;display:block}
.app-shell{min-height:100vh;display:flex;flex-direction:column;max-width:100%;overflow-x:hidden;position:relative}
.container{max-width:var(--maxw);margin:0 auto;padding:0 var(--sp-5);width:100%;box-sizing:border-box}
.site-header{position:sticky;top:0;z-index:60;background:rgba(5,8,16,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.site-header .bar{height:var(--header-h);display:flex;align-items:center;gap:var(--sp-5)}
.brand{display:flex;align-items:center;gap:var(--sp-2);font-family:var(--font-display);font-weight:700;letter-spacing:.01em;font-size:1.1rem;white-space:nowrap}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--grad-flare);box-shadow:0 0 0 4px var(--flare-bg);animation:blink 2.4s infinite}
.brand em{font-style:normal;color:var(--flare)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
.hamburger-btn{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--text-0);flex:none}
.hamburger-btn .bars{position:relative;width:18px;height:13px}
.hamburger-btn .bars span{position:absolute;left:0;width:100%;height:2px;background:currentColor;border-radius:2px;transition:.22s var(--ease)}
.hamburger-btn .bars span:nth-child(1){top:0}
.hamburger-btn .bars span:nth-child(2){top:5.5px}
.hamburger-btn .bars span:nth-child(3){top:11px}
.hamburger-btn.open .bars span:nth-child(1){top:5.5px;transform:rotate(45deg)}
.hamburger-btn.open .bars span:nth-child(2){opacity:0}
.hamburger-btn.open .bars span:nth-child(3){top:5.5px;transform:rotate(-45deg)}
.main-nav{display:flex;align-items:center;gap:var(--sp-1);flex:1;overflow-x:auto;scrollbar-width:none}
.main-nav::-webkit-scrollbar{display:none}
.nav-link{padding:var(--sp-2) var(--sp-3);border-radius:var(--radius-sm);font-weight:600;color:var(--text-1);white-space:nowrap;transition:.15s var(--ease);text-transform:uppercase;letter-spacing:.05em;font-size:.7rem;font-family:var(--font-mono)}
.nav-link:hover{color:var(--text-0);background:var(--bg-2)}
.nav-link.active{color:#1a0d05;background:var(--flare)}
.nav-actions{display:flex;align-items:center;gap:var(--sp-2);margin-left:auto;flex-shrink:0}
.icon-btn{width:36px;height:36px;display:grid;place-items:center;border-radius:var(--radius-sm);color:var(--text-1);transition:.15s var(--ease);border:1px solid transparent}
.icon-btn:hover{background:var(--bg-2);color:var(--text-0)}
.lang-switch{display:flex;align-items:center;gap:2px;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:2px}
.lang-btn{padding:5px 8px;font-size:.65rem;font-weight:700;font-family:var(--font-mono);border-radius:2px;color:var(--text-2);letter-spacing:.03em}
.lang-btn.active{background:var(--flare);color:#1a0d05}
.lang-btn:hover:not(.active){color:var(--text-0)}
@media(max-width:900px){
  .hamburger-btn{display:flex}
  .main-nav{position:fixed;top:var(--header-h);left:0;right:0;flex-direction:column;align-items:stretch;gap:0;background:var(--bg-1);border-bottom:1px solid var(--line);max-height:0;overflow:hidden;opacity:0;transition:max-height .25s var(--ease),opacity .2s var(--ease);z-index:59;box-shadow:var(--shadow-md);padding:0}
  .main-nav.open{max-height:82vh;opacity:1;overflow-y:auto}
  .nav-link{padding:14px var(--sp-5);font-size:.75rem;border-bottom:1px solid var(--line-soft);border-radius:0}
  .nav-link.active{background:var(--flare-bg);color:var(--flare)}
  .nav-actions{flex-direction:column;align-items:stretch;margin-left:0;padding:var(--sp-3) var(--sp-5) var(--sp-5);border-top:1px solid var(--line-soft);gap:var(--sp-3)}
  .nav-actions .icon-btn{width:100%;height:44px;justify-content:flex-start;padding:0 var(--sp-3);border-radius:var(--radius-sm);background:var(--bg-2);color:var(--text-0);display:flex;gap:var(--sp-3);font-weight:600;font-size:.85rem;border:1px solid var(--line)}
  .lang-switch{width:100%;justify-content:space-between}
  .lang-btn{flex:1;text-align:center;padding:10px}
}
.ticker{height:var(--ticker-h);background:var(--bg-1);border-bottom:1px solid var(--line);overflow:hidden;position:relative}
.ticker-track{display:flex;align-items:center;gap:var(--sp-6);height:100%;white-space:nowrap;animation:ticker-scroll 42s linear infinite}
.ticker:hover .ticker-track{animation-play-state:paused}
@keyframes ticker-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:.72rem;color:var(--text-1)}
.tick-item b{color:var(--telem);font-weight:600}
.tick-item .lbl{color:var(--text-2);text-transform:uppercase;letter-spacing:.05em}
.tick-sep{color:var(--line);margin:0 2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:.75rem;letter-spacing:.03em;text-transform:uppercase;background:var(--bg-2);color:var(--text-0);border:1px solid var(--line);transition:.15s var(--ease);font-family:var(--font-mono)}
.btn:hover{border-color:var(--text-2)}
.btn-flare{background:var(--grad-flare);color:#1a0d05;border:none}
.btn-flare:hover{filter:brightness(1.08)}
.btn-ghost{background:none;border:1px solid var(--line)}
.btn-sm{padding:6px 11px;font-size:.68rem}
.btn:disabled{opacity:.4;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:var(--bg-3);color:var(--text-1);font-family:var(--font-mono)}
.chip.safe{background:var(--safe-bg);color:var(--safe)}
.chip.warn{background:var(--warn-bg);color:var(--warn)}
.chip.danger{background:var(--danger-bg);color:var(--danger)}
.chip.flare{background:var(--flare-bg);color:var(--flare)}
.chip.cme{background:var(--cme-bg);color:var(--cme)}
.chip.moon{background:var(--moon-bg);color:var(--moon)}
.chip .pulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.view{padding:var(--sp-6) 0 var(--sp-7);max-width:100%;overflow-x:hidden}
.view-head{display:flex;align-items:baseline;justify-content:space-between;gap:var(--sp-4);margin-bottom:var(--sp-5);flex-wrap:wrap}
.view-title{font-family:var(--font-display);font-size:2rem;font-weight:700;letter-spacing:-.01em}
.view-title em{font-style:normal;color:var(--flare)}
.view-sub{color:var(--text-2);font-size:.85rem;margin-top:2px;font-family:var(--font-mono)}
.section-title{font-family:var(--font-mono);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-1);display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-3)}
.section-title::before{content:"//";color:var(--flare)}
.section{margin-bottom:var(--sp-7)}
.grid{display:grid;gap:var(--sp-3);max-width:100%}
.grid-3{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.grid-2{grid-template-columns:repeat(auto-fill,minmax(360px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
@media(max-width:480px){.grid-3,.grid-2,.grid-4{grid-template-columns:1fr}}
.empty-state{border:1px dashed var(--line);border-radius:var(--radius-lg);padding:var(--sp-6);text-align:center;color:var(--text-2);font-size:.85rem}
.empty-state b{display:block;color:var(--text-1);font-size:.95rem;margin-bottom:4px}
.skeleton{background:linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-md)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.panel{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:var(--sp-4);max-width:100%;box-sizing:border-box}
.panel:hover{border-color:#2c3c52}

/* ── RATE LIMIT BANNER ── */
.rate-banner{background:var(--warn-bg);border:1px solid var(--warn);border-radius:var(--radius-lg);padding:var(--sp-4) var(--sp-5);margin-bottom:var(--sp-5);display:flex;align-items:flex-start;gap:var(--sp-3)}
.rate-banner .rb-icon{font-size:1.4rem;flex:none}
.rate-banner .rb-body b{display:block;color:var(--warn);font-size:.88rem;margin-bottom:4px}
.rate-banner .rb-body p{font-size:.8rem;color:var(--text-1);line-height:1.6}
.rate-banner .rb-body a{color:var(--flare);text-decoration:underline}
.rate-banner .rb-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

/* ── HERO APOD ── */
.hero-apod{position:relative;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--line);margin-bottom:var(--sp-6);min-height:340px;background:var(--bg-1);display:flex;align-items:flex-end}
.hero-apod img,.hero-apod video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.72)}
.hero-apod::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(5,8,16,.94) 0%,rgba(5,8,16,.35) 55%,transparent 100%)}
.hero-body{position:relative;z-index:1;padding:var(--sp-6) var(--sp-5);width:100%}
.hero-eyebrow{font-family:var(--font-mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:var(--flare);margin-bottom:8px}
.hero-title{font-family:var(--font-display);font-size:1.7rem;font-weight:700;max-width:760px}
.hero-summary{color:var(--text-1);font-size:.86rem;max-width:680px;margin-top:10px;line-height:1.6}
.hero-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--sp-6)}
.hero-cell{background:var(--bg-1);padding:var(--sp-4) var(--sp-5);min-width:0}
.hero-cell .lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-2);font-weight:700;margin-bottom:6px;font-family:var(--font-mono)}
.hero-cell .val{font-family:var(--font-mono);font-size:1.45rem;font-weight:600}
.hero-cell .val.telem{color:var(--telem)}
.hero-cell .val.flare{color:var(--flare)}
.hero-cell .sub{font-size:.68rem;color:var(--text-2);margin-top:3px;font-family:var(--font-mono)}
.photo-card{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:.18s var(--ease);position:relative}
.photo-card:hover{border-color:var(--flare);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.photo-card .thumb{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--bg-2)}
.photo-card .pc-body{padding:var(--sp-3)}
.photo-card .pc-title{font-weight:600;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.photo-card .pc-meta{font-size:.68rem;color:var(--text-2);margin-top:4px;font-family:var(--font-mono)}
.photo-card .fav-star{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(5,8,16,.6);backdrop-filter:blur(4px);display:grid;place-items:center;color:var(--text-1);transition:.15s}
.photo-card .fav-star.is-fav{color:var(--flare)}
.photo-card .fav-star:hover{color:var(--flare)}
.filter-row{display:flex;gap:var(--sp-2);flex-wrap:wrap;margin-bottom:var(--sp-5);align-items:flex-end}
.field{display:flex;flex-direction:column;gap:5px;min-width:0}
.field label{font-size:.64rem;text-transform:uppercase;color:var(--text-2);letter-spacing:.05em;font-weight:700;font-family:var(--font-mono)}
.select,.field input{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 12px;font-size:.78rem;color:var(--text-0);max-width:100%;min-width:140px}
.select:focus,.field input:focus{border-color:var(--flare)}
.table{width:100%;border-collapse:collapse;font-size:.8rem}
.table th{text-align:left;padding:8px 10px;font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-2);border-bottom:1px solid var(--line);font-family:var(--font-mono)}
.table td{padding:9px 10px;border-bottom:1px solid var(--line-soft)}
.table tr:hover td{background:var(--bg-2)}
.table .num{font-family:var(--font-mono);text-align:right}
.table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.modal-overlay{position:fixed;inset:0;background:rgba(3,5,10,.78);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:var(--sp-6) var(--sp-4);overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s var(--ease)}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);max-width:820px;width:100%;box-shadow:var(--shadow-lg);transform:translateY(12px);transition:transform .22s var(--ease);min-width:0;overflow:hidden;box-sizing:border-box}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-head{padding:var(--sp-5);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:var(--sp-3)}
.modal-head>div:first-child{min-width:0;overflow:hidden}
.modal-close{width:32px;height:32px;display:grid;place-items:center;border-radius:50%;color:var(--text-2);flex:none}
.modal-close:hover{background:var(--bg-2);color:var(--text-0)}
.modal-body{padding:var(--sp-5);min-width:0;max-width:100%;overflow-x:hidden;box-sizing:border-box}
.modal-img{width:100%;border-radius:var(--radius-md);margin-bottom:var(--sp-4);background:var(--bg-2)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:var(--sp-3);margin-top:var(--sp-4)}
.info-item{background:var(--bg-2);border-radius:var(--radius-md);padding:var(--sp-3);min-width:0}
.info-item .lbl{font-size:.6rem;text-transform:uppercase;color:var(--text-2);letter-spacing:.05em;margin-bottom:3px;font-family:var(--font-mono)}
.info-item .val{font-size:.84rem;font-weight:600;overflow-wrap:break-word;font-family:var(--font-mono)}
.risk-row{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);padding:var(--sp-3);background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-md);margin-bottom:8px;cursor:pointer}
.risk-row:hover{border-color:var(--flare)}
.risk-name{font-weight:700;font-size:.85rem}
.risk-meta{font-size:.7rem;color:var(--text-2);font-family:var(--font-mono);margin-top:2px}
.risk-dot{width:10px;height:10px;border-radius:50%;flex:none}
.risk-dot.safe{background:var(--safe);box-shadow:0 0 8px var(--safe)}
.risk-dot.warn{background:var(--warn);box-shadow:0 0 8px var(--warn)}
.risk-dot.danger{background:var(--danger);box-shadow:0 0 8px var(--danger)}
.risk-dot.cme{background:var(--cme);box-shadow:0 0 8px var(--cme)}
.chart-card{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:var(--sp-4);max-width:100%;box-sizing:border-box;min-width:0}
.chart-card canvas{width:100%;display:block;max-width:100%}
.legend{display:flex;gap:var(--sp-4);flex-wrap:wrap;margin-top:var(--sp-3);font-size:.7rem;color:var(--text-1);font-family:var(--font-mono)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block}
.iss-map{position:relative;width:100%;aspect-ratio:2/1;background:linear-gradient(var(--line-soft) 1px,transparent 1px) 0 0/100% 12.5%,linear-gradient(90deg,var(--line-soft) 1px,transparent 1px) 0 0/8.333% 100%,var(--bg-2);border:1px solid var(--line);border-radius:var(--radius-md);overflow:hidden}
.iss-map .equator{position:absolute;left:0;right:0;top:50%;height:1px;background:var(--flare-dim)}
.iss-map .meridian{position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--flare-dim)}
.iss-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--telem);box-shadow:0 0 0 6px var(--telem-bg),0 0 16px var(--telem);transform:translate(-50%,-50%);transition:left 1s linear,top 1s linear}
.iss-trail{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--telem);opacity:.4;transform:translate(-50%,-50%)}

/* ── LUA ── */
.moon-display{display:flex;flex-direction:column;align-items:center;gap:var(--sp-5);padding:var(--sp-6) 0}
.moon-visual{position:relative;width:200px;height:200px}
.moon-visual canvas{border-radius:50%;display:block}
.moon-phase-label{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--moon);text-align:center;margin-top:var(--sp-3)}
.moon-calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:var(--sp-5)}
.moon-day{background:var(--bg-2);border-radius:8px;padding:8px 4px;text-align:center;font-size:.65rem;color:var(--text-2);font-family:var(--font-mono)}
.moon-day .md-num{font-size:.85rem;font-weight:700;color:var(--text-0);display:block;margin-bottom:3px}
.moon-day .md-icon{font-size:1rem;display:block}
.moon-day.today{border:1px solid var(--moon);background:var(--moon-bg)}

/* ── CME / GEOMAG ── */
.cme-card{background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:var(--sp-4);margin-bottom:10px;transition:.15s var(--ease)}
.cme-card:hover{border-color:var(--cme)}
.cme-header{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);margin-bottom:8px}
.cme-title{font-weight:700;font-size:.88rem}
.cme-meta{font-size:.7rem;color:var(--text-2);font-family:var(--font-mono);line-height:1.6}
.geomag-bar{display:flex;align-items:center;gap:10px;padding:var(--sp-3) var(--sp-4);background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-md);margin-bottom:8px}
.kp-pill{min-width:48px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:.9rem}

.launch-card{display:flex;gap:var(--sp-4);padding:var(--sp-4);background:var(--bg-1);border:1px solid var(--line);border-radius:var(--radius-lg);margin-bottom:12px;flex-wrap:wrap}
.launch-count{display:flex;gap:8px;margin-top:12px}
.launch-count .seg{background:var(--bg-2);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;min-width:52px}
.launch-count .seg b{display:block;font-family:var(--font-mono);font-size:1.15rem;color:var(--flare)}
.launch-count .seg span{font-size:.58rem;color:var(--text-2);text-transform:uppercase;font-family:var(--font-mono)}
.launch-times{margin:8px 0;font-family:var(--font-mono);font-size:.75rem;color:var(--text-1);display:flex;flex-wrap:wrap;gap:12px;background:var(--bg-2);border-radius:var(--radius-md);padding:8px 12px}
.launch-times .lt-lbl{color:var(--text-2);text-transform:uppercase;font-size:.65rem;letter-spacing:.03em}
.launch-times .lt-val{font-weight:700;color:var(--text-0)}
.planet-swatch{width:16px;height:16px;border-radius:50%;flex:none;display:inline-block}
.toast-stack{position:fixed;bottom:var(--sp-5);right:var(--sp-5);z-index:300;display:flex;flex-direction:column;gap:var(--sp-2);max-width:320px}
.toast{background:var(--bg-1);border:1px solid var(--line);border-left:3px solid var(--flare);border-radius:var(--radius-md);padding:var(--sp-3) var(--sp-4);box-shadow:var(--shadow-md);font-size:.8rem;animation:toast-in .25s var(--ease)}
.toast.telem{border-left-color:var(--telem)}
.toast.warn{border-left-color:var(--warn)}
.toast b{display:block;margin-bottom:2px;font-size:.78rem;font-family:var(--font-mono)}
@keyframes toast-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.site-footer{border-top:1px solid var(--line);padding:var(--sp-6) 0;margin-top:auto}
.site-footer .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--sp-3);font-size:.72rem;color:var(--text-2);font-family:var(--font-mono)}
.fade-in{animation:fadeIn .35s var(--ease) both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.reveal-stagger>*{animation:fadeIn .4s var(--ease) both}
.reveal-stagger>*:nth-child(1){animation-delay:.02s}.reveal-stagger>*:nth-child(2){animation-delay:.05s}
.reveal-stagger>*:nth-child(3){animation-delay:.08s}.reveal-stagger>*:nth-child(4){animation-delay:.11s}
.reveal-stagger>*:nth-child(5){animation-delay:.14s}.reveal-stagger>*:nth-child(6){animation-delay:.17s}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important}}
@media(max-width:720px){
  .container{padding:0 var(--sp-4)}
  .view-title{font-size:1.4rem}
  .hero-title{font-size:1.25rem}
  .modal-overlay{padding:0}
  .modal{max-width:100%;width:100%;border-radius:0;min-height:100dvh}
  .modal-body{padding:var(--sp-4)}
}

/* =========================================================
   2. UTILS
   ========================================================= */
const Utils=(function(){
  function el(tag,attrs,children){
    const n=document.createElement(tag);
    if(attrs)for(const k in attrs){
      if(k==="class")n.className=attrs[k];
      else if(k==="html")n.innerHTML=attrs[k];
      else if(k.startsWith("on")&&typeof attrs[k]==="function")n.addEventListener(k.slice(2),attrs[k]);
      else n.setAttribute(k,attrs[k]);
    }
    (children||[]).forEach(c=>{if(c!=null)n.appendChild(typeof c==="string"?document.createTextNode(c):c)});
    return n;
  }
  function fmtDate(iso){const d=new Date(iso);const loc=I18N.lang()==="pt"?"pt-BR":I18N.lang()==="es"?"es-ES":"en-US";return d.toLocaleDateString(loc,{day:"2-digit",month:"short",year:"numeric"})}
  function fmtISODate(d){const dt=d instanceof Date?d:new Date(d);return dt.toISOString().slice(0,10)}
  function daysAgo(n){const d=new Date();d.setUTCDate(d.getUTCDate()-n);return fmtISODate(d)}
  function debounce(fn,ms){let tm;return function(...a){clearTimeout(tm);tm=setTimeout(()=>fn.apply(this,a),ms)}}
  function numFmt(n,digits){if(n===null||n===undefined||isNaN(n))return"—";const loc=I18N.lang()==="pt"?"pt-BR":I18N.lang()==="es"?"es-ES":"en-US";return Number(n).toLocaleString(loc,{maximumFractionDigits:digits??1,minimumFractionDigits:0})}
  function pad2(n){return String(n).padStart(2,"0")}
  function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
  return{el,fmtDate,fmtISODate,daysAgo,debounce,numFmt,pad2,sleep};
})();

/* =========================================================
   3. STORE
   ========================================================= */
const Store=(function(){
  const NS="nasaai:";
  function get(k,fb){try{const v=localStorage.getItem(NS+k);return v===null?fb:JSON.parse(v)}catch(e){return fb}}
  function set(k,v){try{localStorage.setItem(NS+k,JSON.stringify(v))}catch(e){}}
  function cacheGet(k){const e=get("cache:"+k,null);if(!e)return null;if(Date.now()>e.exp)return null;return e.data}
  function cacheSet(k,data,ttlMs){set("cache:"+k,{data,exp:Date.now()+ttlMs})}
  return{get,set,cacheGet,cacheSet};
})();

/* =========================================================
   4. API
   ========================================================= */
const Api=(function(){
  const BASE="https://api.nasa.gov";
  const DEFAULT_KEY="iUNTHYNcvr6rN4c0lqX0FF784V0is5EkpyRlRKNM";
  const ISS_URL="https://api.wheretheiss.at/v1/satellites/25544";
  const IMAGES_BASE="https://images-api.nasa.gov/search";
  const LAUNCH_URL="https://ll.thespacedevs.com/2.2.0/launch/upcoming/";

  function getKey(){return Store.get("apiKey",null)||DEFAULT_KEY}
  function setStatus(s){const n=document.getElementById("apiStatusFoot");if(n)n.textContent="api: "+s}

  // Rastreia se houve rate limit para mostrar banner
  let _rateLimited=false;
  function isRateLimited(){return _rateLimited}
  function clearRateLimit(){_rateLimited=false}

  function withKey(path,params){
    const usp=new URLSearchParams(params||{});
    usp.set("api_key",getKey());
    return BASE+path+(path.includes("?")?"&":"?")+usp.toString();
  }

  async function rawFetch(url,retry){
    let res;
    try{res=await fetch(url)}
    catch(e){setStatus("offline");throw{code:"NETWORK",message:t("err.network")}}
    if(res.status===503&&!retry){await Utils.sleep(1400);return rawFetch(url,true)}
    if(res.status===429||res.status===503){
      setStatus("rate limited");_rateLimited=true;
      throw{code:"RATE_LIMIT",message:t("err.rateLimit")}
    }
    if(res.status===403){setStatus("forbidden");throw{code:"FORBIDDEN",message:t("err.forbidden")}}
    if(!res.ok){setStatus("err "+res.status);throw{code:"HTTP_"+res.status,message:t("err.generic")+" (HTTP "+res.status+")"}}
    setStatus("online");_rateLimited=false;
    return res.json();
  }

  async function get(path,params,ttlMs){
    ttlMs=ttlMs==null?300000:ttlMs;
    const ck=path+"?"+new URLSearchParams(params||{}).toString();
    const cached=Store.cacheGet(ck);
    if(cached)return cached;
    const data=await rawFetch(withKey(path,params),false);
    Store.cacheSet(ck,data,ttlMs);
    return data;
  }

  async function issNow(){
    const cached=Store.cacheGet("iss:now");
    if(cached)return cached;
    setStatus("…");
    let res;
    try{res=await fetch(ISS_URL)}catch(e){setStatus("offline");throw{code:"NETWORK",message:t("err.network")}}
    if(!res.ok)throw{code:"HTTP_"+res.status,message:t("err.network")};
    const data=await res.json();
    setStatus("online");
    Store.cacheSet("iss:now",data,4000);
    return data;
  }

  async function marsImages(query,opts){
    opts=opts||{};
    const ck="images:"+query+":"+JSON.stringify(opts);
    const cached=Store.cacheGet(ck);
    if(cached)return cached;
    const usp=new URLSearchParams({q:query,media_type:"image"});
    if(opts.year_start)usp.set("year_start",opts.year_start);
    if(opts.year_end)usp.set("year_end",opts.year_end);
    if(opts.page_size)usp.set("page_size",opts.page_size);
    setStatus("…");
    let res;
    try{res=await fetch(IMAGES_BASE+"?"+usp.toString())}catch(e){setStatus("offline");throw{code:"NETWORK",message:t("err.network")}}
    if(!res.ok)throw{code:"HTTP_"+res.status,message:t("err.generic")};
    const data=await res.json();
    setStatus("online");
    const items=(data.collection&&data.collection.items)||[];
    Store.cacheSet(ck,items,1800000);
    return items;
  }

  async function launches(limit){
    const ck="launches:"+limit;
    const cached=Store.cacheGet(ck);
    if(cached)return cached;
    setStatus("…");
    let res;
    try{res=await fetch(LAUNCH_URL+"?limit="+(limit||10)+"&mode=normal")}catch(e){setStatus("offline");throw{code:"NETWORK",message:t("err.network")}}
    if(!res.ok)throw{code:"HTTP_"+res.status,message:t("err.generic")};
    const data=await res.json();
    setStatus("online");
    const results=data.results||[];
    Store.cacheSet(ck,results,600000);
    return results;
  }

  async function epic(){
    try{return await get("/EPIC/api/natural",{},1800000)}
    catch(e){
      try{return await get("/EPIC/api/enhanced",{},1800000)}
      catch(e2){throw e2}
    }
  }

  function epicImgUrl(item,type){
    type=type||"natural";
    const d=new Date(item.date.replace(" ","T")+"Z");
    const y=d.getUTCFullYear(),m=Utils.pad2(d.getUTCMonth()+1),day=Utils.pad2(d.getUTCDate());
    return`https://epic.gsfc.nasa.gov/archive/${type}/${y}/${m}/${day}/png/${item.image}.png?api_key=${getKey()}`;
  }

  function invalidateAll(){
    Object.keys(localStorage).forEach(k=>{if(k.startsWith("nasaai:cache:"))localStorage.removeItem(k)});
  }

  return{
    apod:(date)=>get("/planetary/apod",date?{date}:{},3600000),
    apodRandom:()=>get("/planetary/apod",{count:1},0),
    neoFeed:(s,e)=>get("/neo/rest/v1/feed",{start_date:s,end_date:e},600000),
    donkiFlares:(s,e)=>get("/DONKI/FLR",{startDate:s,endDate:e},600000),
    donkiCME:(s,e)=>get("/DONKI/CME",{startDate:s,endDate:e},600000),
    donkiGST:(s,e)=>get("/DONKI/GST",{startDate:s,endDate:e},600000),
    epic,epicImgUrl,marsImages,launches,issNow,invalidateAll,getKey,
    isRateLimited,clearRateLimit,
  };
})();

const Favorites=(function(){
  function all(){return Store.get("favorites",{apod:[],mars:[],asteroids:[]})}
  function isFav(kind,id){return all()[kind].some(x=>x.id===id)}
  function toggle(kind,item){const f=all();if(!f[kind])f[kind]=[];const idx=f[kind].findIndex(x=>x.id===item.id);if(idx>=0)f[kind].splice(idx,1);else f[kind].unshift(item);Store.set("favorites",f);return f[kind].some(x=>x.id===item.id)}
  function remove(kind,id){const f=all();f[kind]=f[kind].filter(x=>x.id!==id);Store.set("favorites",f)}
  return{all,isFav,toggle,remove};
})();

/* =========================================================
   7. ASTRO
   ========================================================= */
const Astro=(function(){
  const SYNODIC=29.53058867;
  const KNOWN_NEW=Date.UTC(2000,0,6,18,14,0);
  function moonPhase(d){d=d||new Date();let p=((d.getTime()-KNOWN_NEW)/86400000%SYNODIC)/SYNODIC;if(p<0)p+=1;return p}
  const PHASE_ICONS=["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];
  const PL={
    pt:["Lua Nova","Crescente","Quarto Crescente","Crescente Gibosa","Lua Cheia","Minguante Gibosa","Quarto Minguante","Minguante"],
    en:["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"],
    es:["Luna Nueva","Creciente","Cuarto Creciente","Gibosa Creciente","Luna Llena","Gibosa Menguante","Cuarto Menguante","Menguante"],
  };
  function phaseIndex(p){const v=p*100;if(v<3||v>97)return 0;if(v<22)return 1;if(v<28)return 2;if(v<47)return 3;if(v<53)return 4;if(v<72)return 5;if(v<78)return 6;return 7}
  function moonPhaseLabel(p){const labels=PL[I18N.lang()]||PL.pt;return labels[phaseIndex(p)]}
  function moonPhaseIcon(p){return PHASE_ICONS[phaseIndex(p)]}
  function moonIllumination(p){return(1-Math.cos(p*2*Math.PI))/2}
  function moonAge(p){return+(p*SYNODIC).toFixed(1)}
  function daysToNextPhase(targetPhase,currentPhase){
    let diff=targetPhase-currentPhase;
    if(diff<0)diff+=1;
    return+(diff*SYNODIC).toFixed(1);
  }
  function nextFullMoon(d){return daysToNextPhase(0.5,moonPhase(d||new Date()))}
  function nextNewMoon(d){return daysToNextPhase(0,moonPhase(d||new Date()))}
  function marsData(d){
    d=d||new Date();
    const JD=d.getTime()/86400000+2440587.5;
    const JDtt=JD+69.184/86400;
    const MSD=(JDtt-2405522.0028779)/1.0274912517;
    const MTC=(MSD%1)*24;
    return{
      msd:MSD,mtc:MTC,
      curiositySol:Math.max(0,Math.floor(MSD-49269.2288943)),
      perseveranceSol:Math.max(0,Math.floor(MSD-52304.011)),
    };
  }
  function fmtMTC(mtc){const h=Math.floor(mtc),m=Math.floor((mtc-h)*60),s=Math.floor((((mtc-h)*60)-m)*60);return Utils.pad2(h)+":"+Utils.pad2(m)+":"+Utils.pad2(s)}
  function drawMoon(canvas,phase){
    const size=canvas.width||200;
    canvas.width=size;canvas.height=size;
    const ctx=canvas.getContext("2d");
    const cx=size/2,cy=size/2,r=size/2-4;
    ctx.clearRect(0,0,size,size);
    // fundo escuro
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle="#0a0e1a";ctx.fill();
    // superfície iluminada ou escura baseada na fase
    const illum=moonIllumination(phase);
    const angle=phase*Math.PI*2;
    // lado iluminado
    ctx.save();
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
    // sombra
    ctx.fillStyle="#0a0e1a";ctx.fillRect(0,0,size,size);
    // luz — desenhamos o lado iluminado
    ctx.beginPath();
    if(phase<0.5){
      // crescente → gibosa crescente (lado direito iluminado)
      const xOff=r*Math.cos(angle+Math.PI/2);
      ctx.arc(cx,cy,r,-Math.PI/2,Math.PI/2);
      ctx.bezierCurveTo(cx+xOff,cy+r,cx+xOff,cy-r,cx,cy-r);
    } else {
      // gibosa minguante → minguante (lado esquerdo iluminado)
      const xOff=r*Math.cos(angle-Math.PI/2);
      ctx.arc(cx,cy,r,Math.PI/2,-Math.PI/2);
      ctx.bezierCurveTo(cx+xOff,cy-r,cx+xOff,cy+r,cx,cy+r);
    }
    ctx.fillStyle="#c8d8f0";ctx.fill();
    ctx.restore();
    // cratera decorativas
    const craters=[[cx-r*.3,cy-r*.2,r*.07],[cx+r*.2,cy+r*.3,r*.05],[cx-r*.1,cy+r*.15,r*.04],[cx+r*.35,cy-r*.35,r*.06]];
    craters.forEach(([x,y,cr])=>{
      ctx.beginPath();ctx.arc(x,y,cr,0,Math.PI*2);
      ctx.fillStyle="rgba(10,14,26,.25)";ctx.fill();
    });
    // borda
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle="rgba(200,216,240,.18)";ctx.lineWidth=1.5;ctx.stroke();
  }
  return{moonPhase,moonPhaseLabel,moonPhaseIcon,moonIllumination,moonAge,nextFullMoon,nextNewMoon,phaseIndex,marsData,fmtMTC,drawMoon};
})();

const Impact=(function(){
  function calc(diam,vel,rho,targetRho){
    const r=diam/2,mass=rho*(4/3)*Math.PI*Math.pow(r,3);
    const velMs=vel*1000,energyJ=0.5*mass*velMs*velMs;
    const tntTons=energyJ/4.184e9;
    const craterKm=1.161*Math.pow(rho/targetRho,1/3)*Math.pow(diam/1000,0.78)*Math.pow(vel,0.44)*Math.pow(9.81,-0.22)*1.25;
    return{mass,energyJ,tntTons,craterKm};
  }
  return{calc};
})();

const Charts=(function(){
  function setup(canvas){
    const ratio=window.devicePixelRatio||1;
    const rect=canvas.getBoundingClientRect();
    const h=canvas.dataset.h?Number(canvas.dataset.h):220;
    canvas.width=rect.width*ratio;canvas.height=h*ratio;canvas.style.height=h+"px";
    const ctx=canvas.getContext("2d");ctx.scale(ratio,ratio);
    return{ctx,w:rect.width,h};
  }
  function cv(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}
  function barChart(canvas,labels,values,opts){
    opts=opts||{};
    const{ctx,w,h}=setup(canvas);
    ctx.clearRect(0,0,w,h);
    const pad={l:34,r:10,t:14,b:26};
    const max=Math.max(1,...values)*1.15;
    const bw=(w-pad.l-pad.r)/Math.max(1,values.length);
    ctx.strokeStyle=cv("--line");ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const y=pad.t+(h-pad.t-pad.b)*(i/4);
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
      ctx.fillStyle=cv("--text-2");ctx.font="10px monospace";ctx.textAlign="right";
      ctx.fillText(Math.round(max*(1-i/4)),pad.l-6,y+3);
    }
    values.forEach((v,i)=>{
      const bh=(h-pad.t-pad.b)*(v/max);
      const x=pad.l+i*bw+bw*.18;
      const y=h-pad.b-bh;
      const grad=ctx.createLinearGradient(0,y,0,h-pad.b);
      grad.addColorStop(0,opts.color||cv("--flare"));
      grad.addColorStop(1,cv("--bg-2"));
      ctx.fillStyle=grad;ctx.fillRect(x,y,bw*.64,bh);
      ctx.fillStyle=cv("--text-1");ctx.font="10px sans-serif";ctx.textAlign="center";
      ctx.fillText(labels[i],x+bw*.32,h-8);
      ctx.fillStyle=cv("--text-0");ctx.font="700 10px monospace";
      ctx.fillText(String(v),x+bw*.32,y-5);
    });
  }
  function donutChart(canvas,segments){
    const{ctx,w,h}=setup(canvas);
    ctx.clearRect(0,0,w,h);
    const cx=w/2,cy=h/2,r=Math.min(w,h)/2-10,rIn=r*.62;
    const total=segments.reduce((s,x)=>s+x.value,0)||1;
    let start=-Math.PI/2;
    segments.forEach(seg=>{
      const angle=(seg.value/total)*Math.PI*2;
      ctx.beginPath();ctx.arc(cx,cy,r,start,start+angle);ctx.arc(cx,cy,rIn,start+angle,start,true);ctx.closePath();
      ctx.fillStyle=seg.color;ctx.fill();start+=angle;
    });
    ctx.fillStyle=cv("--text-0");ctx.font="700 16px monospace";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(segments[0]?Math.round((segments[0].value/total)*100)+"%":"0%",cx,cy);
  }
  function groupedBarChart(canvas,labels,seriesA,seriesB){
    const{ctx,w,h}=setup(canvas);
    ctx.clearRect(0,0,w,h);
    const pad={l:34,r:10,t:14,b:26};
    const max=Math.max(1,...seriesA.data,...seriesB.data)*1.15;
    const bw=(w-pad.l-pad.r)/labels.length;
    ctx.strokeStyle=cv("--line");
    for(let i=0;i<=4;i++){
      const y=pad.t+(h-pad.t-pad.b)*(i/4);
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
      ctx.fillStyle=cv("--text-2");ctx.font="10px monospace";ctx.textAlign="right";
      ctx.fillText(Math.round(max*(1-i/4)),pad.l-6,y+3);
    }
    labels.forEach((l,i)=>{
      const gx=pad.l+i*bw;
      const subw=bw*.36;
      [[seriesA.data[i],seriesA.color,.12],[seriesB.data[i],seriesB.color,.62]].forEach(([v,color,off])=>{
        const bh=(h-pad.t-pad.b)*(v/max);
        ctx.fillStyle=color;ctx.fillRect(gx+bw*off,h-pad.b-bh,subw,bh);
      });
      ctx.fillStyle=cv("--text-1");ctx.font="10px sans-serif";ctx.textAlign="center";
      ctx.fillText(l,gx+bw/2,h-8);
    });
  }
  return{barChart,donutChart,groupedBarChart};
})();

(function(){
  const canvas=document.getElementById("starCanvas");
  const ctx=canvas.getContext("2d");
  let stars=[];
  function resize(){
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    const n=Math.floor(canvas.width*canvas.height/9000);
    stars=Array.from({length:n},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.3+.2,a:Math.random(),s:Math.random()*.012+.003}));
  }
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(st=>{st.a+=st.s;const alpha=(Math.sin(st.a)+1)/2*.8+.15;ctx.beginPath();ctx.fillStyle="rgba(200,215,235,"+alpha.toFixed(3)+")";ctx.arc(st.x,st.y,st.r,0,7);ctx.fill()});
    requestAnimationFrame(tick);
  }
  if(!window.matchMedia("(prefers-reduced-motion:reduce)").matches){
    window.addEventListener("resize",Utils.debounce(resize,200));resize();tick();
  }
})();

const Ticker=(function(){
  let items={utc:"—",local:"—",moon:"—",issAlt:"—",issVel:"—",sol:"—",mtc:"—"};
  function render(){
    const track=document.getElementById("tickerTrack");if(!track)return;
    const list=[
      ["UTC",items.utc],["LOCAL",items.local],
      [t("home.moonPhase").toUpperCase(),items.moon],
      ["ISS ALT",items.issAlt],["ISS VEL",items.issVel],
      [t("home.solCuriosity").toUpperCase(),items.sol],["MTC",items.mtc],
    ];
    const once=()=>list.map(([l,v])=>`<span class="tick-item"><span class="lbl">${l}</span><b>${v}</b></span><span class="tick-sep">◆</span>`).join("");
    track.innerHTML=once()+once();
  }
  function tickClock(){
    const now=new Date();
    items.utc=now.toUTCString().slice(17,25);
    items.local=now.toLocaleTimeString();
    const phase=Astro.moonPhase(now);
    items.moon=Astro.moonPhaseIcon(phase)+" "+Astro.moonPhaseLabel(phase)+" "+Math.round(Astro.moonIllumination(phase)*100)+"%";
    const mars=Astro.marsData(now);
    items.sol=String(mars.curiositySol);
    items.mtc=Astro.fmtMTC(mars.mtc);
    render();
  }
  async function tickISS(){
    try{const d=await Api.issNow();items.issAlt=Utils.numFmt(d.altitude,1)+" km";items.issVel=Utils.numFmt(d.velocity,0)+" km/h"}
    catch(e){items.issAlt="n/d";items.issVel="n/d"}
    render();
  }
  function start(){tickClock();tickISS();setInterval(tickClock,1000);setInterval(tickISS,15000)}
  return{start,render};
})();

const Router=(function(){
  const routes={};let cur="/";
  function on(path,fn){routes[path]=fn}
  function current(){return cur}
  function resolve(){
    const hash=location.hash.replace(/^#/,"")||"/";
    const[pathPart]=hash.split("?");
    const segs=pathPart.split("/").filter(Boolean);
    cur="/"+(segs[0]||"");
    document.querySelectorAll(".nav-link").forEach(a=>a.classList.toggle("active",a.dataset.route==="/"+(segs[0]||"")));
    const nav=document.getElementById("mainNav"),hb=document.getElementById("hamburgerBtn");
    if(nav&&nav.classList.contains("open")){nav.classList.remove("open");if(hb){hb.classList.remove("open");hb.setAttribute("aria-expanded","false")}}
    if(segs.length===0)return routes["/"]();
    if(routes["/"+segs[0]])return routes["/"+segs[0]](segs[1]);
    return routes["/"]();
  }
  function init(){window.addEventListener("hashchange",resolve);resolve()}
  return{on,init,resolve,current};
})();

        bannerBody.innerHTML="";
        bannerBody.append(
          Utils.el("div",{class:"info-item"},[Utils.el("div",{class:"lbl"},[t("weather.total")]),Utils.el("div",{class:"val"},[String(flares.length)])]),
          Utils.el("div",{class:"info-item"},[Utils.el("div",{class:"lbl"},["X"]),Utils.el("div",{class:"val"},[String(counts.X)])]),
          Utils.el("div",{class:"info-item"},[Utils.el("div",{class:"lbl"},["M"]),Utils.el("div",{class:"val"},[String(counts.M)])]),
          Utils.el("div",{class:"info-item"},[Utils.el("div",{class:"lbl"},["C"]),Utils.el("div",{class:"val"},[String(counts.C)])]),
        );
        flareList.innerHTML="";
        if(!flares.length)flareList.appendChild(Utils.el("div",{class:"empty-state"},[t("weather.empty")]));
        else{flareList.appendChild(Utils.el("div",{class:"section-title"},[t("weather.timeline")]));flares.slice().reverse().forEach(f=>flareList.appendChild(flareRow(f)))}
      }catch(err){flareList.innerHTML="";flareList.appendChild(errorState(err,search))}

      // CME
      try{
        const cmes=await Api.donkiCME(fromInput.value,toInput.value);
        cmeHost.innerHTML="";
        if(!cmes||!cmes.length){cmeHost.appendChild(Utils.el("div",{class:"empty-state"},[t("weather.cmeEmpty")]));return}
        cmes.slice().reverse().slice(0,15).forEach(c=>{
          const speed=c.cmeAnalyses&&c.cmeAnalyses[0]?c.cmeAnalyses[0].speed:null;
          const type=c.cmeAnalyses&&c.cmeAnalyses[0]?c.cmeAnalyses[0].type:"—";
          const angle=c.cmeAnalyses&&c.cmeAnalyses[0]?c.cmeAnalyses[0].halfAngle:null;
          const card=Utils.el("div",{class:"cme-card"},[
            Utils.el("div",{class:"cme-header"},[
              Utils.el("div",{class:"cme-title"},["CME · "+(c.startTime||"").replace("T"," ").replace("Z","").slice(0,16)+" UTC"]),
              Utils.el("span",{class:"chip cme"},[type||"—"]),
            ]),
            Utils.el("div",{class:"cme-meta"},[
              t("weather.cmeSpeed")+": "+(speed?Utils.numFmt(speed,0)+" km/s":"—")+" · "+
              t("weather.cmeAngle")+": "+(angle?angle+"°":"—")+(c.note?" · "+c.note.slice(0,80):""),
            ]),
          ]);
          cmeHost.appendChild(card);
        });
      }catch(e){cmeHost.appendChild(Utils.el("div",{class:"empty-state"},[t("weather.cmeEmpty")]))}

      // Geomagnéticas
      try{
        const gsts=await Api.donkiGST(fromInput.value,toInput.value);
        geoHost.innerHTML="";
        if(!gsts||!gsts.length){geoHost.appendChild(Utils.el("div",{class:"empty-state"},[t("weather.geoEmpty")]));return}
        gsts.slice().reverse().slice(0,15).forEach(g=>{
          const kpAll=(g.allKpIndex||[]).map(k=>Number(k.kpIndex));
          const kpMax=kpAll.length?Math.max(...kpAll):0;
          const getSev=kp=>{if(kp>=9)return{cls:"danger",label:t("weather.geoExtreme")};if(kp>=7)return{cls:"danger",label:t("weather.geoSevere")};if(kp>=6)return{cls:"warn",label:t("weather.geoStrong")};if(kp>=5)return{cls:"warn",label:t("weather.geoModerate")};return{cls:"safe",label:t("weather.geoMinor")}};
          const sev=getSev(kpMax);
          const kpColor=kpMax>=7?"#ff4d5e":kpMax>=5?"#ffcc4d":"#4ade80";
          const row=Utils.el("div",{class:"geomag-bar"},[
            Utils.el("div",{class:"kp-pill",style:"background:"+kpColor+"22;color:"+kpColor},[Utils.numFmt(kpMax,1)]),
            Utils.el("div",{style:"flex:1;min-width:0"},[
              Utils.el("div",{class:"risk-name"},[t("weather.geoKp")+": "+Utils.numFmt(kpMax,1)+" · "+sev.label]),
              Utils.el("div",{class:"risk-meta"},[(g.startTime||"").replace("T"," ").replace("Z","").slice(0,16)+" UTC"]),
            ]),
            Utils.el("span",{class:"chip "+sev.cls},[sev.label]),
          ]);
          geoHost.appendChild(row);
        });
      }catch(e){geoHost.appendChild(Utils.el("div",{class:"empty-state"},[t("weather.geoEmpty")]))}
    }
    searchBtn.onclick=search;search();
  }

  /* ── LANÇAMENTOS ── */
  let launchTimers=[];
  async function renderLaunches(){
    launchTimers.forEach(clearInterval);launchTimers=[];
    main().innerHTML="";
    main().appendChild(Utils.el("div",{class:"view-head"},[Utils.el("div",{},[Utils.el("h1",{class:"view-title"},[t("launches.title")]),Utils.el("p",{class:"view-sub"},[t("launches.subtitle")])])]));
    const host=Utils.el("div");main().appendChild(host);
    host.appendChild(loadingBlock(4));
    try{
      const results=await Api.launches(12);
      host.innerHTML="";
      if(!results.length){host.appendChild(Utils.el("div",{class:"empty-state"},[t("launches.empty")]));return}
      results.forEach(l=>host.appendChild(launchCard(l)));
    }catch(err){host.innerHTML="";host.appendChild(errorState(err,renderLaunches))}
  }
  function launchCard(l){
    const card=Utils.el("div",{class:"launch-card fade-in"});
    const img=l.image?Utils.el("img",{src:l.image,alt:l.name,style:"width:96px;height:96px;object-fit:cover;border-radius:8px;flex:none;background:var(--bg-2)"}):null;
    const utcDate=new Date(l.net);
    const brtDate=new Date(utcDate.toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
    const brtStr=brtDate.toLocaleString(undefined,{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});
    const timesEl=Utils.el("div",{class:"launch-times"},[
      Utils.el("span",{},[Utils.el("span",{class:"lt-lbl"},[t("launches.utcTime")+": "]),Utils.el("span",{class:"lt-val"},[utcDate.toISOString().replace("T"," ").slice(0,16)+" UTC"])]),
      Utils.el("span",{},[Utils.el("span",{class:"lt-lbl"},[t("launches.brtTime")+": "]),Utils.el("span",{class:"lt-val"},[brtStr])]),
    ]);
    const info=Utils.el("div",{style:"flex:1;min-width:200px"},[
      Utils.el("div",{style:"font-weight:700;font-size:.95rem;margin-bottom:4px"},[l.name]),
      Utils.el("div",{class:"risk-meta"},[t("launches.agency")+": "+(l.launch_service_provider?l.launch_service_provider.name:"—")]),
      Utils.el("div",{class:"risk-meta"},[t("launches.rocket")+": "+(l.rocket&&l.rocket.configuration?l.rocket.configuration.name:"—")]),
      Utils.el("div",{class:"risk-meta"},[t("launches.pad")+": "+(l.pad?l.pad.name+", "+(l.pad.location?l.pad.location.name:""):"—")]),
      Utils.el("div",{class:"risk-meta"},[t("launches.status")+": "+(l.status?l.status.name:"—")]),
      timesEl,
    ]);
    const countdown=Utils.el("div",{class:"launch-count"});info.appendChild(countdown);
    function tick(){
      const diff=utcDate.getTime()-Date.now();countdown.innerHTML="";
      if(diff<=0){countdown.appendChild(Utils.el("span",{class:"chip flare"},["LANÇADO"]));return}
      const dd=Math.floor(diff/86400000),hh=Math.floor(diff/3600000)%24,mm=Math.floor(diff/60000)%60,ss=Math.floor(diff/1000)%60;
      [[dd,t("launches.days")],[hh,t("launches.hours")],[mm,t("launches.min")],[ss,t("launches.sec")]].forEach(([v,lb])=>countdown.appendChild(Utils.el("div",{class:"seg"},[Utils.el("b",{},[String(v).padStart(2,"0")]),Utils.el("span",{},[lb])])));
    }
    tick();
    const timer=setInterval(()=>{if(Router.current()!=="/lancamentos"){clearInterval(timer);return}tick()},1000);
    launchTimers.push(timer);
    if(img)card.appendChild(img);card.appendChild(info);return card;
  }

  /* ── PLANETAS ── */
  function renderPlanets(){
    main().innerHTML="";
    main().appendChild(Utils.el("div",{class:"view-head"},[Utils.el("div",{},[Utils.el("h1",{class:"view-title"},[t("planets.title")]),Utils.el("p",{class:"view-sub"},[t("planets.subtitle")])])]));
    const lang=I18N.lang();
    const toolbar=Utils.el("div",{class:"filter-row"});
    const selA=Utils.el("select",{class:"select"},PLANETS.map(p=>Utils.el("option",{value:p.id},[p.name[lang]||p.name.pt])));
    const selB=Utils.el("select",{class:"select"},PLANETS.map(p=>Utils.el("option",{value:p.id},[p.name[lang]||p.name.pt])));
    selA.value="earth";selB.value="mars";
    toolbar.append(field("A",selA),field("B",selB));main().appendChild(toolbar);
    const grid=Utils.el("div",{class:"grid grid-2",style:"margin-bottom:24px"});
    const chartHost=Utils.el("div",{class:"chart-card"},[Utils.el("div",{class:"section-title"},[t("planets.diameter")])]);
    const canvas=Utils.el("canvas",{"data-h":"220"});chartHost.appendChild(canvas);
    const legendHost=Utils.el("div");chartHost.appendChild(legendHost);
    const tableHost=Utils.el("div",{class:"panel"});
    grid.append(chartHost,tableHost);main().appendChild(grid);
    function paint(){
      const lg=I18N.lang();
      const a=PLANETS.find(p=>p.id===selA.value),b=PLANETS.find(p=>p.id===selB.value);
      requestAnimationFrame(()=>Charts.groupedBarChart(canvas,[t("planets.diameter"),t("planets.gravity")+" ×1000"],{data:[a.diameter/100,a.gravity*1000/100],color:a.color},{data:[b.diameter/100,b.gravity*1000/100],color:b.color}));
      legendHost.innerHTML="";legendHost.appendChild(Utils.el("div",{class:"legend"},[Utils.el("span",{},[Utils.el("i",{style:"background:"+a.color}),a.name[lg]||a.name.pt]),Utils.el("span",{},[Utils.el("i",{style:"background:"+b.color}),b.name[lg]||b.name.pt])]));
      const rows=[
        [t("planets.mass"),a.mass,b.mass],[t("planets.diameter"),a.diameter,b.diameter],[t("planets.gravity"),a.gravity,b.gravity],
        [t("planets.dayLength"),Utils.numFmt(a.dayH,1)+"h",Utils.numFmt(b.dayH,1)+"h"],
        [t("planets.yearLength"),Utils.numFmt(a.yearD,0)+"d",Utils.numFmt(b.yearD,0)+"d"],
        [t("planets.moons"),a.moons,b.moons],[t("planets.avgTemp"),a.temp+"°C",b.temp+"°C"],[t("planets.distanceSun"),a.distSun,b.distSun],
      ];
      tableHost.innerHTML="";
      const table=Utils.el("table",{class:"table"});
      table.appendChild(Utils.el("thead",{},[Utils.el("tr",{},[Utils.el("th",{},[""]),Utils.el("th",{},[a.name[lg]||a.name.pt]),Utils.el("th",{},[b.name[lg]||b.name.pt])])]));
      const tbody=Utils.el("tbody");
      rows.forEach(([lb,va,vb])=>tbody.appendChild(Utils.el("tr",{},[Utils.el("td",{},[lb]),Utils.el("td",{class:"num"},[String(va)]),Utils.el("td",{class:"num"},[String(vb)])])));
      table.appendChild(tbody);tableHost.appendChild(table);
    }
    selA.onchange=paint;selB.onchange=paint;paint();
  }

  /* ── FAVORITOS ── */
  function renderFavorites(){
    main().innerHTML="";
    main().appendChild(Utils.el("div",{class:"view-head"},[Utils.el("div",{},[Utils.el("h1",{class:"view-title"},[t("favorites.title")]),Utils.el("p",{class:"view-sub"},[t("favorites.subtitle")])])]));
    const f=Favorites.all();
    function favSection(title,items,emptyMsg,renderFn){
      const sec=Utils.el("div",{class:"section"});
      sec.appendChild(Utils.el("div",{class:"section-title"},[title+" ("+items.length+")"]));
      const body=Utils.el("div",{class:"grid grid-3"});
      if(!items.length)body.appendChild(Utils.el("div",{class:"empty-state"},[emptyMsg]));
      else items.forEach(renderFn.bind(null,body));
      sec.appendChild(body);return sec;
    }
    main().appendChild(favSection(t("favorites.apodSection"),f.apod,t("favorites.emptyApod"),(body,item)=>{
      const card=Utils.el("div",{class:"photo-card"},[Utils.el("img",{class:"thumb",src:item.url,alt:item.title,loading:"lazy"}),Utils.el("div",{class:"pc-body"},[Utils.el("div",{class:"pc-title"},[item.title]),Utils.el("div",{class:"pc-meta"},[item.date])])]);
      const rm=Utils.el("button",{class:"fav-star is-fav"},["★"]);rm.onclick=(e)=>{e.stopPropagation();Favorites.remove("apod",item.id);renderFavorites()};card.appendChild(rm);body.appendChild(card);
    }));
    main().appendChild(favSection(t("favorites.marsSection"),f.mars,t("favorites.emptyMars"),(body,item)=>{
      const card=Utils.el("div",{class:"photo-card"},[Utils.el("img",{class:"thumb",src:item.img_src,alt:item.title,loading:"lazy"}),Utils.el("div",{class:"pc-body"},[Utils.el("div",{class:"pc-title"},[item.title]),Utils.el("div",{class:"pc-meta"},[(item.date||"").slice(0,10)])])]);
      const rm=Utils.el("button",{class:"fav-star is-fav"},["★"]);rm.onclick=(e)=>{e.stopPropagation();Favorites.remove("mars",item.id);renderFavorites()};card.appendChild(rm);body.appendChild(card);
    }));
    const neoSec=Utils.el("div",{class:"section"});
    neoSec.appendChild(Utils.el("div",{class:"section-title"},[t("favorites.asteroidsSection")+" ("+f.asteroids.length+")"]));
    if(!f.asteroids.length)neoSec.appendChild(Utils.el("div",{class:"empty-state"},[t("favorites.emptyAsteroids")]));
    f.asteroids.forEach(item=>{
      const row=Utils.el("div",{class:"risk-row"},[Utils.el("div",{},[Utils.el("div",{class:"risk-name"},[item.name]),Utils.el("div",{class:"risk-meta"},[item.date])]),(()=>{const rm=Utils.el("button",{class:"btn btn-sm"},[t("favorites.remove")]);rm.onclick=()=>{Favorites.remove("asteroids",item.id);renderFavorites()};return rm})()]);
      neoSec.appendChild(row);
    });
    main().appendChild(neoSec);
  }

  return{renderHome,renderApod,renderMars,renderIss,renderAsteroids,renderMoon,renderEarth,renderSpaceWeather,renderLaunches,renderPlanets,renderFavorites};
})();

/* =========================================================
   15. APP BOOTSTRAP
   ========================================================= */
function openSettings(){
  document.getElementById("apiKeyInput").value="";
  document.getElementById("settingsModal").classList.add("open");
  document.body.classList.add("modal-open");
  I18N.applyStatic();
}
function closeSettings(){document.getElementById("settingsModal").classList.remove("open");syncModal()}
function closeDetail(){document.getElementById("detailModal").classList.remove("open");syncModal()}
function syncModal(){const any=document.getElementById("detailModal").classList.contains("open")||document.getElementById("settingsModal").classList.contains("open");document.body.classList.toggle("modal-open",any)}
function toggleNav(force){
  const nav=document.getElementById("mainNav"),hb=document.getElementById("hamburgerBtn");
  const open=force!==undefined?force:!nav.classList.contains("open");
  nav.classList.toggle("open",open);hb.classList.toggle("open",open);hb.setAttribute("aria-expanded",open?"true":"false");
}

function initApp(){
  I18N.applyStatic();
  Router.on("/",Views.renderHome);
  Router.on("/apod",Views.renderApod);
  Router.on("/marte",Views.renderMars);
  Router.on("/iss",Views.renderIss);
  Router.on("/asteroides",Views.renderAsteroids);
  Router.on("/lua",Views.renderMoon);
  Router.on("/terra",Views.renderEarth);
  Router.on("/clima",Views.renderSpaceWeather);
  Router.on("/lancamentos",Views.renderLaunches);
  Router.on("/planetas",Views.renderPlanets);
  Router.on("/favoritos",Views.renderFavorites);
  Router.init();

  document.getElementById("hamburgerBtn").onclick=(e)=>{e.stopPropagation();toggleNav()};
  document.getElementById("mainNav").addEventListener("click",(e)=>{if(e.target.closest(".nav-link"))toggleNav(false)});
  document.addEventListener("click",(e)=>{const nav=document.getElementById("mainNav");if(!nav.classList.contains("open"))return;if(e.target.closest("#mainNav")||e.target.closest("#hamburgerBtn"))return;toggleNav(false)});
  window.addEventListener("resize",Utils.debounce(()=>{if(window.innerWidth>900)toggleNav(false)},150));

  document.getElementById("langSwitch").addEventListener("click",(e)=>{const btn=e.target.closest(".lang-btn");if(!btn)return;I18N.setLang(btn.dataset.lang);Ticker.render();Router.resolve()});
  document.getElementById("refreshBtn").onclick=()=>{Api.invalidateAll();Api.clearRateLimit();Router.resolve();Toast.show(t("toast.updated"),t("toast.updatedMsg"),{telem:true})};
  document.getElementById("settingsBtn").onclick=openSettings;
  document.getElementById("settingsCloseBtn").onclick=closeSettings;
  document.getElementById("settingsModal").addEventListener("click",(e)=>{if(e.target.id==="settingsModal")closeSettings()});
  document.getElementById("modalCloseBtn").onclick=closeDetail;
  document.getElementById("detailModal").addEventListener("click",(e)=>{if(e.target.id==="detailModal")closeDetail()});
  document.addEventListener("keydown",(e)=>{if(e.key==="Escape"){closeSettings();closeDetail();toggleNav(false)}});
  document.getElementById("saveSettingsBtn").onclick=()=>{
    const key=document.getElementById("apiKeyInput").value.trim();
    if(key)Store.set("apiKey",key);
    Api.invalidateAll();Api.clearRateLimit();closeSettings();
    Toast.show(t("toast.configured"),t("settings.saved"),{telem:true});
    Router.resolve();
  };
  Ticker.start();
}
document.addEventListener("DOMContentLoaded",initApp);
})();
</script>
